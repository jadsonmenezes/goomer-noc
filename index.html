function renderWidgetTesteRede(getValor, h, token) {
    const ativo  = getValor('teste_rede_ativo') === 'true';
    const inicio = getValor('teste_rede_inicio') || '';
    const fim    = getValor('teste_rede_fim')    || '';
    if (ativo) {
        return '<div style="background:rgba(0,214,143,.06);border:1px solid rgba(0,214,143,.2);border-radius:8px;padding:14px">'
            + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'
            + '<div><span style="font-size:13px;font-weight:700;color:var(--green)">✅ Teste ativo</span>'
            + '<span style="font-size:11px;color:#8096b8;margin-left:8px">' + h(inicio||'?') + ' → ' + h(fim||'?') + '</span></div>'
            + '<button onclick="desativarTesteRede(this.dataset.tok)" data-tok="' + token + '" style="background:rgba(255,68,85,.15);border:1px solid rgba(255,68,85,.3);color:#ff6b7a;padding:5px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:700">Desativar</button>'
            + '</div>'
            + '<div style="font-size:11px;color:#8096b8">Bateria de 40 pings por tablet a cada ciclo (5min). Resultado aparece na aba Tablets ao final.</div>'
            + '</div>';
    }
    return '<div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px">'
        + '<div style="font-size:12px;color:#8096b8;margin-bottom:14px">'
        + 'Executa bateria de 40 pings por tablet a cada ciclo (5min) dentro da janela configurada.<br>'
        + 'Acumula latência, % de perda de pacotes e sinal WiFi por mesa.<br>'
        + '<span style="color:#a0b8d0">Use quando o cliente reportar falhas intermitentes de envio de pedidos.</span>'
        + '</div>'
        + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">'
        + '<div><label style="font-size:11px;color:#8096b8;display:block;margin-bottom:4px">🕐 Início</label>'
        + '<input id="tr-inicio-fixo" type="time" value="' + h(inicio) + '" style="width:100%;background:var(--bg2);border:1px solid var(--border);color:#e8eef8;padding:7px 10px;border-radius:6px;font-size:14px;font-family:var(--mono);box-sizing:border-box"></div>'
        + '<div><label style="font-size:11px;color:#8096b8;display:block;margin-bottom:4px">🕐 Fim</label>'
        + '<input id="tr-fim-fixo" type="time" value="' + h(fim) + '" style="width:100%;background:var(--bg2);border:1px solid var(--border);color:#e8eef8;padding:7px 10px;border-radius:6px;font-size:14px;font-family:var(--mono);box-sizing:border-box"></div>'
        + '</div>'
        + '<button onclick="ativarTesteRede(this.dataset.tok)" data-tok="' + token + '" style="width:100%;background:var(--blue-l);border:none;color:#fff;padding:9px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:700">▶ Ativar Teste de Rede</button>'
        + '</div>';
}

async function salvarFlagTexto(token, chave, valor) {
    if (!token) { console.error('[FLAG] token_loja vazio — não salvando', chave); return; }
    console.log('[FLAG] salvando:', chave, '=', valor, '| token:', token.slice(0,20) + '...');
    const hdrs = {
        'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY,
        'Content-Type': 'application/json'
    };
    try {
        // Verificar se já existe registro para esta loja+chave
        const existing = await fetch(
            SB_URL + '/rest/v1/agente_config?chave=eq.' + encodeURIComponent(chave) + '&token_loja=eq.' + encodeURIComponent(token),
            { headers: hdrs }
        ).then(r => r.json()).catch(() => []);

        let resp;
        if (Array.isArray(existing) && existing.length > 0) {
            // PATCH no registro existente
            resp = await fetch(
                SB_URL + '/rest/v1/agente_config?chave=eq.' + encodeURIComponent(chave) + '&token_loja=eq.' + encodeURIComponent(token),
                { method: 'PATCH', headers: { ...hdrs, 'Prefer': 'return=minimal' },
                  body: JSON.stringify({ valor, atualizado_por: 'NOC', atualizado_em: new Date().toISOString() }) }
            );
        } else {
            // POST novo registro
            resp = await fetch(
                SB_URL + '/rest/v1/agente_config',
                { method: 'POST', headers: { ...hdrs, 'Prefer': 'return=minimal' },
                  body: JSON.stringify({ token_loja: token, chave, valor, atualizado_por: 'NOC', atualizado_em: new Date().toISOString() }) }
            );
        }

        if (resp.ok) {
            console.log('[FLAG] ✅ salvo:', chave, '=', valor);
        } else {
            const err = await resp.text().catch(()=>'');
            console.error('[FLAG] ❌ Erro ao salvar', chave, ':', resp.status, err);
        }
    } catch(e) { console.error('[FLAG] ❌ Exceção ao salvar flag:', e); }
}

async function ativarTesteRede(token) {
    if (!token || token === 'null' || token === 'undefined') {
        alert('Token da loja inválido — reabra a loja e tente novamente.');
        return;
    }
    const inicio = document.getElementById('tr-inicio-fixo')?.value;
    const fim    = document.getElementById('tr-fim-fixo')?.value;
    if (!inicio || !fim) { alert('Informe o horário de início e fim.'); return; }
    if (inicio === fim)  { alert('Início e fim não podem ser iguais.'); return; }

    // Salvar no Supabase
    await Promise.all([
        salvarFlagTexto(token, 'teste_rede_inicio', inicio),
        salvarFlagTexto(token, 'teste_rede_fim',    fim),
        salvarFlagTexto(token, 'teste_rede_ativo',  'true'),
    ]);

    // Atualizar cfgLoja local em memória e re-renderizar o widget sem reload
    _cfgLojaAtual['teste_rede_inicio'] = inicio;
    _cfgLojaAtual['teste_rede_fim']    = fim;
    _cfgLojaAtual['teste_rede_ativo']  = 'true';

    const getValorLocal = chave => _cfgLojaAtual[chave] ?? 'true';
    const h2 = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    document.getElementById('widget-teste-rede').innerHTML =
        renderWidgetTesteRede(getValorLocal, h2, token);

    document.getElementById('config-status').textContent = '✅ Teste ativado: ' + inicio + ' → ' + fim;
}

async function desativarTesteRede(token) {
    await salvarFlagTexto(token, 'teste_rede_ativo', 'false');

    // Atualizar cfgLoja local e re-renderizar sem reload
    _cfgLojaAtual['teste_rede_ativo'] = 'false';

    const getValorLocal = chave => _cfgLojaAtual[chave] ?? 'true';
    const h2 = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    document.getElementById('widget-teste-rede').innerHTML =
        renderWidgetTesteRede(getValorLocal, h2, token);

    document.getElementById('config-status').textContent = '✅ Teste de rede desativado.';
}

async function toggleFlag(token, chave, novoValor, btnEl) {
    const st  = document.getElementById('config-status');
    const btn = btnEl || document.querySelector(`[data-flag="${chave}"]`);
    if (st)  st.innerHTML = '<span style="color:#8096b8">Salvando...</span>';
    if (btn) { btn.disabled = true; btn.textContent = '...'; }

    const valor = novoValor ? 'true' : 'false';
    const hdrs  = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' };
    const body  = { token_loja: token, chave, valor, descricao: 'Alterado via NOC', atualizado_por: 'NOC', atualizado_em: new Date().toISOString() };

    // Verificar se já existe registro para esta loja+chave
    const existing = await fetch(
        `${SB_URL}/rest/v1/agente_config?chave=eq.${encodeURIComponent(chave)}&token_loja=eq.${encodeURIComponent(token)}`,
        { headers: hdrs }
    ).then(r => r.json()).catch(() => []);

    let r;
    if (Array.isArray(existing) && existing.length > 0) {
        r = await fetch(
            `${SB_URL}/rest/v1/agente_config?chave=eq.${encodeURIComponent(chave)}&token_loja=eq.${encodeURIComponent(token)}`,
            { method: 'PATCH', headers: { ...hdrs, 'Prefer': 'return=minimal' },
              body: JSON.stringify({ valor, atualizado_por: 'NOC', atualizado_em: new Date().toISOString() }) }
        );
    } else {
        r = await fetch(
            `${SB_URL}/rest/v1/agente_config`,
            { method: 'POST', headers: { ...hdrs, 'Prefer': 'return=minimal' }, body: JSON.stringify(body) }
        );
    }

    if (r.ok) {
        // ── Atualizar visual imediatamente sem recarregar ─────────────────
        if (btn) {
            btn.disabled   = false;
            btn.textContent = novoValor ? 'ON' : 'OFF';
            btn.style.background = novoValor ? 'var(--green)' : 'rgba(255,68,85,.2)';
            btn.style.color      = novoValor ? '#0a0a1a'      : '#ff6b7a';
            // Atualizar onclick para o próximo toggle
            btn.setAttribute('onclick', `toggleFlag('${token}','${chave}',${!novoValor},this)`);
        }

        // Atualizar visual do card pai (borda e opacidade do nome)
        const card = btn?.closest('[data-flag-card]');
        if (card) {
            card.style.border = novoValor
                ? '1px solid var(--border)'
                : '1px solid rgba(255,68,85,.2)';
            const nome = card.querySelector('[data-flag-nome]');
            if (nome) nome.style.color = novoValor ? '#e8eef8' : '#8096b8';
        }

        if (st) st.innerHTML = `<span style="color:var(--green)">✓ ${novoValor?'Ativado':'Desativado'} — aplicado no próximo ciclo do agente</span>`;
        setTimeout(() => { if (st) st.innerHTML = ''; }, 4000);
    } else {
        const err = await r.text().catch(() => '');
        console.error('toggleFlag erro:', r.status, err);
        if (btn) { btn.disabled = false; btn.textContent = novoValor ? 'ON' : 'OFF'; }
        if (st)  st.innerHTML = `<span style="color:var(--red)">✗ Erro ao salvar (${r.status})</span>`;
    }
}

async function restaurarPadrao(token, chave) {
    const st  = document.getElementById('config-status');
    const btn = document.querySelector(`[data-flag="${chave}"]`);
    if (st) st.innerHTML = '<span style="color:#8096b8">Restaurando...</span>';

    const r = await fetch(
        `${SB_URL}/rest/v1/agente_config?chave=eq.${encodeURIComponent(chave)}&token_loja=eq.${encodeURIComponent(token)}`,
        { method: 'DELETE', headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Prefer': 'return=minimal' } }
    );

    if (r.ok) {
        if (btn) {
            btn.textContent      = 'ON';
            btn.style.background = 'var(--green)';
            btn.style.color      = '#0a0a1a';
            btn.setAttribute('onclick', `toggleFlag('${token}','${chave}',false,this)`);
            const card = btn.closest('[data-flag-card]');
            if (card) {
                card.style.border = '1px solid var(--border)';
                const nome = card.querySelector('[data-flag-nome]');
                if (nome) { nome.style.color = '#e8eef8'; const badge = nome.querySelector('span'); if(badge) badge.remove(); }
                const btnPadrao = card.querySelector('button[onclick*="restaurarPadrao"]');
                if (btnPadrao) btnPadrao.remove();
            }
        }
        if (st) { st.innerHTML = '<span style="color:var(--green)">✓ Restaurado — recurso ativo novamente</span>'; setTimeout(()=>{if(st)st.innerHTML='';},4000); }
    } else {
        if (st) st.innerHTML = '<span style="color:var(--red)">✗ Erro ao restaurar</span>';
    }
}

// ── Gestão de versões padrão ──────────────────────────────────────────────────
async function salvarVersoes() {
    const srv = document.getElementById('ver-servidor')?.value?.trim();
    const tab = document.getElementById('ver-tablet')?.value?.trim();
    const st  = document.getElementById('ver-status');
    if (!srv && !tab) { if(st) st.textContent = 'Informe pelo menos uma versão.'; return; }
    if (st) st.textContent = 'Salvando...';

    const salvar = async (componente, versao, descricao) => {
        if (!versao) return true;
        const hdrs = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' };
        // Tentar PATCH primeiro (update), se não existir faz POST (insert)
        const rPatch = await fetch(
            `${SB_URL}/rest/v1/versoes_padrao?componente=eq.${encodeURIComponent(componente)}`,
            { method: 'PATCH', headers: hdrs, body: JSON.stringify({ versao, descricao, atualizado_por:'NOC', atualizado_em: new Date().toISOString() }) }
        );
        if (rPatch.ok) return true;
        const rPost = await fetch(
            `${SB_URL}/rest/v1/versoes_padrao`,
            { method: 'POST', headers: hdrs, body: JSON.stringify({ componente, versao, descricao, atualizado_por:'NOC', atualizado_em: new Date().toISOString() }) }
        );
        return rPost.ok;
    };

    const ok1 = await salvar('servidor_goomer', srv, 'Servidor Goomer / Abrahão');
    const ok2 = await salvar('app_tablet',      tab, 'App tablet Goomer');

    if (ok1 && ok2) {
        if (srv) _versoesPadrao.servidor_goomer = srv;
        if (tab) _versoesPadrao.app_tablet      = tab;
        if (st) st.innerHTML = '<span style="color:var(--green)">✓ Salvo</span>';
        await carregar(); // recarregar para aplicar badges
    } else {
        if (st) st.innerHTML = '<span style="color:var(--red)">✗ Erro ao salvar</span>';
    }
}

// Preencher campos com versões atuais ao carregar
function preencherCamposVersao() {
    const vs = document.getElementById('ver-servidor');
    const vt = document.getElementById('ver-tablet');
    if (vs && _versoesPadrao.servidor_goomer) vs.value = _versoesPadrao.servidor_goomer;
    if (vt && _versoesPadrao.app_tablet)      vt.value = _versoesPadrao.app_tablet;
}

// ── Exportar lojas desatualizadas ─────────────────────────────────────────────
async function exportarDesatualizados() {
    if (!Object.keys(_versoesPadrao).length) {
        alert('Defina as versões mínimas antes de exportar.');
        return;
    }

    const agora = new Date();
    const lojas = _dados.filter(l => {
        const pay = l.payload||{};
        const srvDesat = _versoesPadrao.servidor_goomer &&
            compararVersao(pay.goomer_version, _versoesPadrao.servidor_goomer) === 'desatualizado';
        const tabDesat = _versoesPadrao.app_tablet &&
            (pay.tablets||[]).some(t => compararVersao(t.versao, _versoesPadrao.app_tablet) === 'desatualizado');
        return srvDesat || tabDesat;
    });

    if (!lojas.length) { alert('Nenhuma loja desatualizada encontrada.'); return; }

    if (typeof XLSX === 'undefined') {
        alert('Biblioteca Excel não carregada. Recarregue a página.'); return;
    }

    const xlsWb = XLSX.utils.book_new();
    const nowStr = agora.toLocaleString('pt-BR');

    // ── Aba 1: Resumo de Desatualizadas ───────────────────────────────────────
    const resumoHdr = ['Loja','IP Servidor','Versão Servidor','Versão Mínima Srv','Status Servidor',
                       'Versão App (desatualizado)','Versão Mínima App','Tablets Desatualizados',
                       'Score','Status','AnyDesk ID','TeamViewer ID','Último Snapshot'];
    const resumoRows = lojas.map(l => {
        const pay = l.payload||{};
        const srvVer  = pay.goomer_version || '—';
        const srvMin  = _versoesPadrao.servidor_goomer || '—';
        const srvDesat = compararVersao(srvVer, srvMin) === 'desatualizado';
        const tabsDesat = (pay.tablets||[]).filter(t =>
            compararVersao(t.versao, _versoesPadrao.app_tablet) === 'desatualizado'
        );
        const vAppDesat = tabsDesat.length > 0 ? tabsDesat[0].versao : '—';
        const tabsStr   = tabsDesat.map(t=>`${t.mesa?'Mesa '+t.mesa:t.ip||'?'} (v${t.versao})`).join(', ') || '—';
        return [
            l.nome_loja||'?',
            l.ip_servidor||pay.ip_servidor||'—',
            srvVer, srvMin, srvDesat?'Desatualizado':'OK',
            vAppDesat, _versoesPadrao.app_tablet||'—',
            tabsStr,
            l.score||0, l.status||l.nota||'?',
            pay.anydesk_id||'—', pay.teamviewer_id||'—',
            new Date(l.criado_em).toLocaleString('pt-BR')
        ];
    });

    const ws1 = XLSX.utils.aoa_to_sheet([
        [`GOOMER NOC — Lojas com Versões Desatualizadas`],
        [`Exportado em: ${nowStr}  •  Versão mínima servidor: ${_versoesPadrao.servidor_goomer||'—'}  •  App: ${_versoesPadrao.app_tablet||'—'}`],
        [`Total: ${lojas.length} loja(s) desatualizada(s)`],
        [],
        resumoHdr,
        ...resumoRows
    ]);
    ws1['!cols'] = [{wch:30},{wch:16},{wch:15},{wch:15},{wch:15},{wch:15},{wch:13},{wch:40},{wch:8},{wch:12},{wch:14},{wch:14},{wch:18}];
    XLSX.utils.book_append_sheet(xlsWb, ws1, 'Resumo Desatualizadas');

    // ── Aba 2: Detalhe por Tablet desatualizado ───────────────────────────────
    const tabHdr = ['Loja','IP Servidor','Mesa / Tablet','IP Tablet','Versão App Atual','Versão Mínima','Status Tablet','Bateria %','Sinal %'];
    const tabRows = [];
    lojas.forEach(l => {
        const pay = l.payload||{};
        (pay.tablets||[]).filter(t => compararVersao(t.versao, _versoesPadrao.app_tablet)==='desatualizado').forEach(t => {
            tabRows.push([
                l.nome_loja||'?',
                l.ip_servidor||pay.ip_servidor||'—',
                t.mesa?`Mesa ${t.mesa}`:t.modelo||'Tablet',
                t.ip||'—',
                t.versao||'—',
                _versoesPadrao.app_tablet||'—',
                t.ping?.status||'—',
                t.bateria||'—',
                t.sinal||'—'
            ]);
        });
    });
    const ws2 = XLSX.utils.aoa_to_sheet([tabHdr,...(tabRows.length?tabRows:[['Sem tablets desatualizados','','','','','','','','']])]);
    ws2['!cols'] = [{wch:28},{wch:16},{wch:14},{wch:16},{wch:15},{wch:13},{wch:14},{wch:11},{wch:10}];
    XLSX.utils.book_append_sheet(xlsWb, ws2, 'Tablets Desatualizados');

    XLSX.writeFile(xlsWb, `goomer_versoes_desatualizadas_${agora.toISOString().slice(0,10)}.xlsx`);
    alert(`✓ ${lojas.length} loja(s) exportada(s) para Excel.`);
}

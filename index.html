<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Goomer NOC</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// Extensão de estilos para XLSX — aplicada após carregamento da lib base
// Cores Goomer NOC para células do Excel
window.XLSXStyle = {
    // Cria um objeto de estilo de célula
    cellStyle: function(opts) {
        const s = {};
        if (opts.bg)   s.fill = { patternType: 'solid', fgColor: { rgb: opts.bg.replace('#','') } };
        if (opts.bold || opts.color || opts.sz) s.font = {
            bold: opts.bold||false,
            color: opts.color ? { rgb: opts.color.replace('#','') } : { rgb: '333333' },
            sz: opts.sz||9, name: 'Arial'
        };
        if (opts.center) s.alignment = { horizontal: 'center', vertical: 'center', wrapText: opts.wrap||false };
        else s.alignment = { horizontal: 'left', vertical: 'center', wrapText: opts.wrap||false, indent: 1 };
        s.border = {
            top:    { style: 'thin', color: { rgb: 'D0D8E8' } },
            bottom: { style: 'thin', color: { rgb: 'D0D8E8' } },
            left:   { style: 'thin', color: { rgb: 'D0D8E8' } },
            right:  { style: 'thin', color: { rgb: 'D0D8E8' } }
        };
        return s;
    },
    // Aplica estilo a uma célula na worksheet
    apply: function(ws, cellRef, style) {
        if (!ws[cellRef]) return;
        ws[cellRef].s = style;
    },
    // Estilos padrão Goomer
    H:  function(cor_txt) { return this.cellStyle({ bg:'0E5CFE', bold:true, color: cor_txt||'FFFFFF', sz:9, center:true }); },
    OK: function() { return this.cellStyle({ bg:'F0FFF8', bold:true, color:'00A86B', center:true }); },
    WN: function() { return this.cellStyle({ bg:'FFFBF0', bold:true, color:'FFB830', center:true }); },
    ER: function() { return this.cellStyle({ bg:'FFF0F2', bold:true, color:'FF4455', center:true }); },
    LB: function(alt) { return this.cellStyle({ bg: alt?'F5F8FF':'FFFFFF', bold:true, color:'333333' }); },
    DT: function(alt) { return this.cellStyle({ bg: alt?'F5F8FF':'FFFFFF', color:'666666', center:true }); },
    BL: function(alt) { return this.cellStyle({ bg: alt?'F5F8FF':'FFFFFF', color:'0055AA', center:true }); },
};
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
:root{
  --bg:#04080f;--bg2:#080f1c;--bg3:#0d1626;--bg4:#111e33;
  --border:rgba(14,92,254,0.15);--border2:rgba(14,92,254,0.3);
  --text:#e8eef8;--sub:#8096b8;--muted:#3a4f72;
  --green:#00d68f;--blue:#0e5cfe;--blue-l:#4d8fff;
  --amber:#ffb830;--red:#ff4455;--purple:#7c5cfc;
  --sans:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
}
body{background:var(--bg);color:#e8eef8;font-family:var(--sans);min-height:100vh}

.topbar{background:var(--blue);padding:0 16px;height:50px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 20px rgba(14,92,254,0.35)}
.logo{font-size:15px;font-weight:800;letter-spacing:.08em;color:#fff}
.logo span{font-weight:400;opacity:.7}
.topbar-right{display:flex;align-items:center;gap:14px}
#last-update{font-size:11px;color:rgba(255,255,255,0.9);font-family:var(--mono)}
.btn{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;padding:5px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;transition:.15s}
.btn:hover{background:rgba(255,255,255,0.25)}

.main{padding:16px;max-width:1600px;margin:0 auto}

/* Barra de busca e filtros */
.toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.search-input{flex:1;min-width:200px;background:var(--bg2);border:1px solid var(--border2);color:var(--text);padding:9px 14px;border-radius:8px;font-size:13px;font-family:var(--sans);outline:none}
.search-input:focus{border-color:var(--blue)}
.search-input::placeholder{color:#8096b8}
.filter-btn{background:var(--bg2);border:1px solid var(--border);color:var(--sub);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;transition:.15s}
.filter-btn:hover,.filter-btn.ativo{background:rgba(14,92,254,0.12);border-color:var(--blue);color:var(--blue-l)}

/* Resumo geral */
.resumo{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:16px}
.rc{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.rc-lbl{font-size:11px;color:#a0b8d0;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;font-weight:600}
.rc-val{font-size:24px;font-weight:800;font-family:var(--mono);line-height:1}
.rc-sub{font-size:11px;color:#a0b8d0;margin-top:4px;font-weight:500}

/* Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}

/* Card loja */
.loja{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:.18s}
.loja:hover{border-color:var(--border2);transform:translateY(-1px);box-shadow:0 6px 24px rgba(0,0,0,.3)}
.loja-head{padding:13px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.status-badge{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;border:1.5px solid}
.loja-info{flex:1;min-width:0}
.loja-nome{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.loja-ip{font-size:11px;color:var(--sub);font-family:var(--mono);margin-top:2px}
.score-circle{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;border:2.5px solid;flex-shrink:0;font-family:var(--mono)}
.loja-body{padding:12px 16px}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.kpi{background:var(--bg3);border-radius:7px;padding:7px 8px;text-align:center}
.kpi-val{font-size:16px;font-weight:700;font-family:var(--mono);line-height:1}
.kpi-lbl{font-size:10px;color:#a0b8d0;text-transform:uppercase;letter-spacing:.04em;margin-top:3px;font-weight:500}
.alertas{display:flex;flex-direction:column;gap:3px}
.al{display:flex;align-items:center;gap:6px;font-size:11px;padding:4px 8px;border-radius:5px;font-weight:500}
.al-crit{background:rgba(255,68,85,.1);color:#ff6b7a;border-left:2px solid var(--red)}
.al-warn{background:rgba(255,184,48,.08);color:#ffc94d;border-left:2px solid var(--amber)}
.al-ok{background:rgba(0,214,143,.07);color:#33e8a8;border-left:2px solid var(--green)}
.al-info{background:rgba(14,92,254,.08);color:var(--blue-l);border-left:2px solid var(--blue)}
.loja-foot{padding:7px 16px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:11px;color:#a0b8d0}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:16px 8px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.overlay.on{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:820px;margin:auto;min-width:0}
.modal-head{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;background:var(--bg2);z-index:1;border-radius:14px 14px 0 0}
.modal-close{background:none;border:none;color:var(--sub);font-size:20px;cursor:pointer;padding:2px 8px;line-height:1}
.modal-close:hover{color:var(--text)}
.modal-body{padding:20px}
.modal-tabs{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
.modal-tab{white-space:nowrap}
.modal-tab{background:var(--bg3);border:1px solid var(--border);color:var(--sub);padding:6px 14px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;transition:.15s}
.modal-tab:hover,.modal-tab.on{background:rgba(14,92,254,.15);border-color:var(--blue);color:var(--blue-l)}
.modal-panel{display:none}.modal-panel.on{display:block}
.sec{margin-bottom:18px}
.sec-t{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#8096b8;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px}
.row:last-child{border:none}
.rl{color:#a0b8d0}
.rv{font-weight:600;font-family:var(--mono);text-align:right}
/* Tab item */
.tab-card{background:var(--bg3);border-radius:8px;padding:10px 12px;margin-bottom:8px;border:1px solid var(--border)}
.tab-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.tab-nome{font-size:13px;font-weight:700}
.bar-row{display:flex;align-items:center;gap:8px;font-size:11px;color:#8096b8;margin-bottom:4px}
.bar-track{height:4px;background:var(--bg4);border-radius:2px;flex:1}
.bar-fill{height:100%;border-radius:2px}
/* Erros */
.erro-item{background:var(--bg3);border-radius:7px;padding:9px 12px;margin-bottom:6px;border-left:3px solid var(--red)}
.erro-msg{font-size:12px;color:#e8eef8;font-family:var(--mono);margin-bottom:4px;word-break:break-word;white-space:normal;line-height:1.5}
.erro-meta{font-size:10px;color:#8096b8;display:flex;gap:10px}
/* Histórico */
.hist{display:flex;align-items:flex-end;gap:3px;height:56px;margin-top:6px}
.hist-bar{flex:1;border-radius:2px 2px 0 0;min-height:2px;cursor:default}
/* Topologia mini */
.topo-mini{background:var(--bg3);border-radius:8px;padding:12px;border:1px solid var(--border);text-align:center;font-size:12px;color:var(--sub)}
/* Badge */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;border:1px solid}
.bg{background:rgba(0,214,143,.12);color:#33e8a8;border-color:rgba(0,214,143,.3)}
.br{background:rgba(255,68,85,.12);color:#ff6b7a;border-color:rgba(255,68,85,.3)}
.ba{background:rgba(255,184,48,.12);color:#ffc94d;border-color:rgba(255,184,48,.3)}
.bm{background:rgba(255,255,255,.06);color:var(--sub);border-color:rgba(255,255,255,.1)}
.bb{background:rgba(14,92,254,.12);color:var(--blue-l);border-color:rgba(14,92,254,.3)}
.autocorr-item{background:rgba(0,214,143,.06);border:1px solid rgba(0,214,143,.2);border-radius:8px;padding:10px 14px;margin-bottom:8px;font-size:12px}
.autocorr-falhou{background:rgba(255,184,48,.06);border-color:rgba(255,184,48,.2)}
.corr-item{border-radius:8px;padding:10px 14px;margin-bottom:8px;border-left:3px solid}
.corr-crit{background:rgba(255,68,85,.07);border-color:var(--red)}
.corr-aviso{background:rgba(255,184,48,.07);border-color:var(--amber)}
.corr-info{background:rgba(14,92,254,.07);border-color:var(--blue)}
.corr-titulo{font-size:13px;font-weight:700;margin-bottom:4px}
.corr-detalhe{font-size:12px;color:#a0b8d0;margin-bottom:4px;line-height:1.5}
.corr-acao{font-size:11px;color:#8096b8;font-style:italic}
.lat-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px}
.lat-row:last-child{border:none}
.lat-lbl{width:80px;color:#a0b8d0;flex-shrink:0}
.lat-bar-wrap{flex:1;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.lat-bar{height:100%;border-radius:3px;transition:width .4s}
.lat-val{width:90px;text-align:right;font-family:var(--mono);font-weight:600;font-size:11px}
.lat-sub{font-size:10px;color:#8096b8;margin-left:4px}
.empty{text-align:center;padding:40px 20px;color:#8096b8;font-size:14px}
.loading{text-align:center;padding:40px;color:var(--sub);font-size:13px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── Responsivo ─────────────────────────────────────────────────── */
@media(max-width:768px){
  .main{padding:12px}
  .resumo{grid-template-columns:repeat(3,1fr);gap:7px}
  .grid{grid-template-columns:1fr;gap:10px}
  .toolbar{gap:6px}
  .filter-btn{padding:5px 9px;font-size:11px}
  .overlay{padding:8px}
  .modal-head{padding:14px}
  .modal-body{padding:14px}
  .modal-tab{padding:5px 10px;font-size:11px}
}
@media(max-width:480px){
  .main{padding:8px}
  .resumo{grid-template-columns:repeat(2,1fr);gap:6px}
  .rc{padding:10px 12px}
  .rc-val{font-size:18px}
  .rc-lbl{font-size:10px}
  .topbar{padding:0 10px}
  .logo{font-size:13px}
  #last-update{font-size:10px}
  .grid{grid-template-columns:1fr}
  .loja-head{padding:10px 12px;gap:8px}
  .score-circle{width:38px;height:38px;font-size:11px}
  .loja-nome{font-size:13px}
  .status-badge{font-size:10px;padding:3px 8px}
  .search-input{font-size:12px;padding:7px 10px}
  .filter-btn{padding:5px 8px;font-size:11px}
  .overlay{padding:4px}
  .modal{border-radius:10px}
  .modal-head{padding:12px}
  .modal-body{padding:10px}
  .modal-tabs{gap:3px;padding-bottom:4px}
  .modal-tab{padding:5px 8px;font-size:11px}
  /* Linha do modal empilha no mobile */
  .row{flex-wrap:wrap;gap:2px}
  .rv{font-size:12px}
  .rl{font-size:12px}
  /* Histórico: tabela com scroll horizontal */
  #hist-resultado{overflow-x:auto;-webkit-overflow-scrolling:touch}
  #hist-resultado table{min-width:500px}
  /* Topologia */
  #topo-noc-wrap{height:300px}
  /* Filtros em duas linhas */
  .toolbar{flex-wrap:wrap}
  #btn-order{margin-left:0}
}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">GOOMER <span>NOC</span></div>
  <div class="topbar-right">
    <span id="last-update">—</span>
    <button class="btn" onclick="carregar()">↺ atualizar</button>
  </div>
</div>

<div class="main">
  <div class="resumo" id="resumo"></div>
  <div id="versoes-config" style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:16px;flex-wrap:wrap">
    <div style="font-size:11px;font-weight:700;color:#a0b8d0;text-transform:uppercase;letter-spacing:.07em">Versões mínimas</div>
    <div style="display:flex;align-items:center;gap:8px;font-size:12px">
        <label style="color:#8096b8">Servidor Goomer:</label>
        <input id="ver-servidor" type="text" placeholder="ex: 2.4.114"
            style="background:var(--bg3);border:1px solid var(--border2);color:#e8eef8;padding:5px 10px;border-radius:5px;font-family:var(--mono);font-size:12px;width:100px">
    </div>
    <div style="display:flex;align-items:center;gap:8px;font-size:12px">
        <label style="color:#8096b8">App tablet:</label>
        <input id="ver-tablet" type="text" placeholder="ex: 2.10.3"
            style="background:var(--bg3);border:1px solid var(--border2);color:#e8eef8;padding:5px 10px;border-radius:5px;font-family:var(--mono);font-size:12px;width:100px">
    </div>
    <button onclick="salvarVersoes()"
        style="background:var(--blue);border:none;color:#fff;padding:6px 16px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600">
        💾 Salvar
    </button>
    <div id="ver-status" style="font-size:11px;color:#8096b8"></div>
  </div>

  <div class="toolbar">
    <input class="search-input" id="busca" placeholder="🔍  buscar loja por nome..." oninput="filtrar()">
    <button class="filter-btn ativo" id="f-todos"    onclick="setFiltro('todos')">Todas</button>
    <button class="filter-btn"       id="f-critico"  onclick="setFiltro('critico')">🔴 Crítico/Grave</button>
    <button class="filter-btn"       id="f-atencao"  onclick="setFiltro('atencao')">🟡 Atenção</button>
    <button class="filter-btn"       id="f-ok"       onclick="setFiltro('ok')">🟢 Estável/Saudável</button>
    <button class="filter-btn"       id="f-offline"       onclick="setFiltro('offline')">⚫ Offline</button>
    <button class="filter-btn"       id="f-desatualizado" onclick="setFiltro('desatualizado')">🔄 Desatualizado</button>
    <button class="filter-btn"       id="f-inativas"      onclick="setFiltro('inativas')">⊘ Inativas</button>
    <button class="filter-btn" id="btn-order" onclick="toggleOrder()" style="margin-left:auto" title="Ordenar por score">↑ score</button>
    <button class="filter-btn" onclick="exportarDesatualizados()" title="Exportar lojas desatualizadas" style="background:rgba(14,92,254,.1);border-color:rgba(14,92,254,.3);color:#7ab3ff">↓ exportar desatualizados</button>
  </div>

  <div id="grid"><div class="loading">carregando lojas...</div></div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="closeOverlay(event)">
  <div class="modal" id="modal">
    <div class="modal-head">
      <div>
        <div style="font-size:16px;font-weight:700" id="m-titulo">—</div>
        <div style="font-size:11px;color:#8096b8;margin-top:3px;font-family:var(--mono)" id="m-sub">—</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <button onclick="exportarLoja()" title="Exportar dados da loja"
              style="background:rgba(14,92,254,.1);border:1px solid rgba(14,92,254,.3);color:#7ab3ff;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600">
              ↓ exportar
          </button>
          <div id="btn-inativar-wrap"></div>
          <button class="modal-close" onclick="document.getElementById('overlay').classList.remove('on')">✕</button>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-tabs">
        <button class="modal-tab on" onclick="showTab('resumo')">Resumo</button>
        <button class="modal-tab"    onclick="showTab('diagnostico')">🔍 Diagnóstico</button>
        <button class="modal-tab"    onclick="showTab('tablets')">Tablets</button>
        <button class="modal-tab"    onclick="showTab('erros')">Logs de Erro</button>
        <button class="modal-tab"    onclick="showTab('topologia')">Topologia</button>
        <button class="modal-tab"    onclick="showTab('maquina')">Máquina</button>
        <button class="modal-tab"    onclick="showTab('historico')">Histórico</button>
        <button class="modal-tab"    onclick="showTab('autocorrecoes')">⚙ Autocorreções</button>
        <button class="modal-tab"    onclick="showTab('config')">Agente</button>
      </div>
      <div id="tab-resumo"        class="modal-panel on"></div>
      <div id="tab-diagnostico"   class="modal-panel"></div>
      <div id="tab-tablets"       class="modal-panel"></div>
      <div id="tab-erros"         class="modal-panel"></div>
      <div id="tab-topologia"     class="modal-panel"></div>
      <div id="tab-maquina"       class="modal-panel"></div>
      <div id="tab-historico"     class="modal-panel"></div>
      <div id="tab-autocorrecoes" class="modal-panel"></div>
      <div id="tab-config"        class="modal-panel"></div>
    </div>
  </div>
</div>

<script>
const SB_URL = 'https://jlatddmzhatbznbgfhfa.supabase.co';
const SB_KEY = 'sb_publishable_2VjqdmgtHSAkY123Fyc_qQ_SbZawfuR';

const h = s => { const d=document.createElement('div'); d.textContent=String(s??''); return d.innerHTML; };

const COR_STATUS = s => ({
    'Saudável':'#00d68f','Estável':'#4d8fff',
    'Atenção':'#ffb830','Crítico':'#ff4455','Grave':'#cc2233'
}[s]||'#8096b8');

// Cor baseada no objeto loja (usa normStatus para forçamentos)
function corLoja(l) {
    const ns = normStatus(l);
    if (ns==='grave')   return '#ff4455';
    if (ns==='atencao') return '#ffb830';
    return '#00d68f';
}

const BAR_COR = (v,lo,hi) => v>=hi?'#ff4455':v>=lo?'#ffb830':'#00d68f';

let _cfgLojaAtual = {}; // espelho local do cfgLoja do modal aberto
let _dados = [], _filtro = 'todos', _order = 'asc'; // asc = piores primeiro
let _versoesPadrao = {}; // versões mínimas carregadas do Supabase
let _todosRows = []; // todos os snapshots para cálculo de tendência
let _tendencias = {}; // tendência por loja
let _lojasBloqueadas = []; // lojas inativas carregadas do Supabase

async function sb(path, q='') {
    const r = await fetch(`${SB_URL}/rest/v1/${path}${q}`,{
        headers:{
            'apikey': SB_KEY,
            'Authorization': `Bearer ${SB_KEY}`,
            'Content-Type': 'application/json'
        }
    });
    if (!r.ok) {
        console.error('Supabase erro:', r.status, r.statusText, await r.text().catch(()=>''));
        return [];
    }
    return r.json();
}

async function carregar() {
    document.getElementById('last-update').textContent =
        new Date().toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});

    // Carregar tudo em paralelo
    const [rows, bloqueadas, versoesPadrao] = await Promise.all([
        // Buscar em duas etapas para garantir que todas as lojas apareçam sempre:
        // 1. Snapshots recentes para tendência e histórico
        // 2. Último snapshot de cada loja (sem filtro de data — nenhuma loja some)
        // Tentar usar a view que retorna 1 snapshot por loja (criada via SUPABASE_MANUTENCAO.sql)
        // Se a view não existir, fallback para query com limit alto
        await sb('ultimo_snapshot_por_loja','?select=*&order=criado_em.desc').catch(() => null)
            .then(async v => {
                if (v && v.length > 0) return v;
                // Fallback: buscar snapshots sem filtro de data
                return sb('snapshots','?select=*&order=criado_em.desc&limit=3000');
            }),
        sb('lojas_bloqueadas','?select=token_loja,nome_loja,motivo,bloqueado_em,bloqueado_por').catch(()=>[]),
        sb('versoes_padrao','?select=*').catch(()=>[])
    ]);
    const tokensBloqueados = new Set((Array.isArray(bloqueadas)?bloqueadas:[]).map(b=>b.token_loja));
    _lojasBloqueadas = Array.isArray(bloqueadas) ? bloqueadas : [];

    // Indexar versões padrão
    const vPadrao = {};
    (Array.isArray(versoesPadrao)?versoesPadrao:[]).forEach(v => { vPadrao[v.componente] = v.versao; });
    _versoesPadrao = vPadrao; // guardar globalmente para filtros e exportação

    if (!Array.isArray(rows)||!rows.length) {
        document.getElementById('grid').innerHTML =
            '<div class="empty">📡 Nenhuma loja conectada ainda.<br><span style="font-size:12px;color:#8096b8">Instale o agente nas lojas piloto e aguarde o primeiro envio.</span></div>';
        return;
    }

    // Guardar todos os rows para cálculo de tendência
    _todosRows = rows;

    // Agrupar por token — mais recente de cada loja (excluir bloqueadas)
    const map = {};
    rows.forEach(r => {
        if (tokensBloqueados.has(r.token_loja)) return; // ignorar bloqueadas
        if (!map[r.token_loja]||r.criado_em>map[r.token_loja].criado_em) map[r.token_loja]=r;
    });
    _dados = Object.values(map).sort((a,b)=>a.score-b.score);

    renderResumo();
    calcularTendencias();
    filtrar();
    preencherCamposVersao();
}

// ── Calcular tendência por loja ───────────────────────────────────────────────
// Agrupa snapshots por loja (últimas 5 ocorrências) e calcula direção do score
function calcularTendencias() {
    // Agrupar todos os snapshots por loja
    const porLoja = {};
    (_todosRows||[]).forEach(r => {
        if (!porLoja[r.token_loja]) porLoja[r.token_loja] = [];
        porLoja[r.token_loja].push(r.score||0);
    });

    _tendencias = {};
    Object.entries(porLoja).forEach(([token, scores]) => {
        if (scores.length < 2) return;
        const ultimos = scores.slice(0, 5); // já ordenados desc
        const atual   = ultimos[0];
        const media   = Math.round(ultimos.slice(1).reduce((s,v)=>s+v,0) / (ultimos.length-1));
        const delta   = atual - media;

        let seta = '→', cor = '#8096b8';
        if      (delta >= 5)  { seta = '↑'; cor = 'var(--green)'; }
        else if (delta <= -5) { seta = '↓'; cor = 'var(--red)'; }

        _tendencias[token] = { seta, delta, cor, media };
    });
}

// Normalizar status — suporte a registros antigos (letras) e novos (texto)
function compararVersao(versaoAtual, versaoMinima) {
    if (!versaoAtual || !versaoMinima) return null; // sem dados
    const parse = v => (v||'0').split('.').map(n=>parseInt(n)||0);
    const a = parse(versaoAtual), m = parse(versaoMinima);
    for (let i=0; i<Math.max(a.length,m.length); i++) {
        const da = a[i]||0, dm = m[i]||0;
        if (da < dm) return 'desatualizado';
        if (da > dm) return 'atualizado';
    }
    return 'atualizado';
}

function normStatus(l) {
    const s = (l.status||l.nota||'').toLowerCase().trim();
    let cat;
    if (s==='grave'||s==='f')                  cat='grave';
    else if (s==='crítico'||s==='critico'||s==='d') cat='grave';
    else if (s==='atenção'||s==='atencao'||s==='c') cat='atencao';
    else if (s==='estável'||s==='estavel'||s==='b') cat='ok';
    else if (s==='saudável'||s==='saudavel'||s==='a') cat='ok';
    else cat='atencao';

    // Forçar categoria mínima para condições críticas (corrige snapshots antigos)
    if (!l.servidor_online && (cat==='ok')) cat='grave';
    const pay = l.payload||{};
    if (pay.inadimplente && cat==='ok') cat='grave';
    if ((l.retry_expirados||0)>0 && cat==='ok') cat='atencao';

    return cat;
}

// Status descritivo para exibição (considera forçamentos)
function statusLabel(l) {
    if (!l.servidor_online) return 'Crítico';
    const pay = l.payload||{};
    if (pay.inadimplente)          return 'Crítico';
    return l.status||l.nota||'?';
}

function renderResumo() {
    const total    = _dados.length;
    const graves   = _dados.filter(l=>normStatus(l)==='grave').length;
    const atencao  = _dados.filter(l=>normStatus(l)==='atencao').length;
    const ok       = _dados.filter(l=>normStatus(l)==='ok').length;
    const offline  = _dados.filter(l=>!l.servidor_online).length;
    const agora_r  = new Date();
    const semDados = _dados.filter(l=>Math.round((agora_r-new Date(l.criado_em))/60000)>60).length;
    const scoreAvg = total>0 ? Math.round(_dados.reduce((s,l)=>s+(l.score||0),0)/total) : 0;
    const tabAtivos= _dados.reduce((s,l)=>s+(l.tablets_ativos||0),0);

    document.getElementById('resumo').innerHTML = [
        {lbl:'Lojas monitoradas', val:total,            sub:'',              cor:''},
        {lbl:'Crítico / Grave',   val:graves,           sub:'ação imediata', cor:graves>0?'var(--red)':'var(--green)'},
        {lbl:'Atenção',           val:atencao,          sub:'monitorar',     cor:atencao>0?'var(--amber)':'var(--sub)'},
        {lbl:'Estável / Saudável',val:ok,               sub:'operação normal',cor:'var(--green)'},
        {lbl:'Servidor Goomer offline',  val:offline,          sub:'',              cor:offline>0?'var(--red)':'var(--green)'},
        {lbl:'Sem dados (+1h)',    val:semDados,         sub:'desconectados',  cor:semDados>0?'var(--red)':'var(--sub)'},
        {lbl:'Saúde média',       val:scoreAvg+'%',     sub:'saúde geral',   cor:''},
        {lbl:'Tablets ativos',    val:tabAtivos,        sub:'total nas lojas',cor:''},
    ].map(c=>`<div class="rc" style="${c.cor?'border-color:'+c.cor+'40':''}">
        <div class="rc-lbl">${c.lbl}</div>
        <div class="rc-val" style="color:${c.cor||'var(--text)'}">${c.val}</div>
        ${c.sub?`<div class="rc-sub">${c.sub}</div>`:''}
    </div>`).join('');
}

function toggleOrder() {
    _order = _order === 'asc' ? 'desc' : 'asc';
    const btn = document.getElementById('btn-order');
    if (btn) btn.textContent = _order === 'asc' ? '↑ score' : '↓ score';
    filtrar();
}

function setFiltro(f) {
    _filtro = f;
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('ativo'));
    document.getElementById('f-'+f)?.classList.add('ativo');
    filtrar();
}

function filtrar() {
    const busca  = (document.getElementById('busca')?.value||'').toLowerCase();
    const agora  = new Date();

    // Para filtro inativas: usar _lojasBloqueadas como fonte de dados
    const fonte = _filtro === 'inativas'
        ? _lojasBloqueadas.map(b => ({
            token_loja:     b.token_loja,
            nome_loja:      b.nome_loja,
            score:          0,
            nota:           'Inativa',
            servidor_online:false,
            criado_em:      b.bloqueado_em || new Date(0).toISOString(),
            payload:        { motivo: b.motivo, bloqueado_por: b.bloqueado_por, bloqueado_em: b.bloqueado_em }
          }))
        : _dados;

    const lista = fonte.filter(l => {
        const nome   = (l.nome_loja||'').toLowerCase();
        const ip     = (l.ip_servidor||l.payload?.ip_servidor||'').toLowerCase();
        const mins_l = Math.round((agora - new Date(l.criado_em||0)) / 60000);
        if (busca && !nome.includes(busca) && !ip.includes(busca)) return false;
        if (_filtro==='inativas')    return true; // já filtrado pela fonte
        const ns = normStatus(l);
        if (_filtro==='critico') return ns==='grave';
        if (_filtro==='atencao') return ns==='atencao';
        if (_filtro==='ok')      return ns==='ok';
        if (_filtro==='offline')      return !l.servidor_online || mins_l > 60;
        if (_filtro==='desatualizado') {
            const pay = l.payload||{};
            const srvDesat = _versoesPadrao.servidor_goomer &&
                compararVersao(pay.goomer_version, _versoesPadrao.servidor_goomer) === 'desatualizado';
            const tabDesat = _versoesPadrao.app_tablet &&
                (pay.tablets||[]).some(t => compararVersao(t.versao, _versoesPadrao.app_tablet) === 'desatualizado');
            return srvDesat || tabDesat;
        }
        return true;
    });
    lista.sort((a,b) => _order==='asc' ? a.score-b.score : b.score-a.score);
    renderGrid(lista);
}

            const bInfo = _lojasBloqueadas.find(b => b.token_loja === l.token_loja) || {};

        // Autocorreções — separar por tipo para exibir mensagem correta

                als.push({c:'crit', m:`Conflito de porta ${c.porta}: processo "${c.processo}" interferindo — pode causar falha de impressão`})
            );

        if ((pay.conflitos_ip||[]).length > 0) {
            pay.conflitos_ip.forEach(c =>

            als.push({c:'warn', m:`Agente duplicado: snapshots de ${(pay.agente_duplicado.hosts_outros||[]).join(', ')} — remover agente da máquina incorreta`});
        }

        const _autocorrecoes = pay.autocorrecoes || [];
        const _acIP      = _autocorrecoes.filter(a => a.tipo === 'ip_sincronizado');

    // ── Tab Diagnóstico de Correlação ────────────────────────────────────────
    const corrs = pay.correlacoes || [];

        {lbl:'Lat. GW',    val:latD?.gateway?.med?latD.gateway.med+'ms':null, cor:!latD?.gateway?.med?'#8096b8':latD.gateway.med>50?'var(--amber)':'var(--green)'},

    metricas.forEach(m=>{

    diagHtml += '</div>';

    // ── Breakdown do score ────────────────────────────────────────────────────
    const _score = l.score || 0;
    const _srvPts  = l.servidor_online ? 40 : 0;
    const _retries = l.retry_expirados||0;

    const _erpPts  = _retries===0 && !(pay.erros_erp>0) ? 25

                   : _taxaHora<=3 ? 22
                   : _taxaHora<=10 ? 14
                   : 0;
    const _logPts  = (l.erros_log||0)===0 ? 20 : (l.erros_log||0)<50 ? 16 : (l.erros_log||0)<200 ? 10 : (l.erros_log||0)<500 ? 5 : 0;
    const _maqPts  = maqD ? (maqD.cpu<70&&maqD.ram_pct<80&&!(maqD.discos||[]).some(d=>d.pct>75)?15:maqD.cpu<85&&maqD.ram_pct<90?10:5) : 10;
    const _ipPen   = (pay.ip_divergente||l.ip_divergente) ? -20 : 0;
    const _total   = 40+25+20+15 + ((_ipPen<0)?20:0);
    const _calc    = _srvPts+_erpPts+_logPts+_maqPts;

    const scoreBar = (pts, max, cor) => `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">

    diagHtml += `<div style="background:var(--bg3);border-radius:10px;padding:14px;margin-bottom:16px">

        </div>
        <div style="font-size:12px;color:#e8eef8;margin-bottom:3px">Servidor Goomer
            <span style="float:right;color:${_srvPts===40?'var(--green)':'var(--red)'}">${_srvPts}/40 pts ${_srvPts<40?'⚠':''}</span>

        <div style="font-size:12px;color:#e8eef8;margin-bottom:3px">Integração ERP

        </div>
        ${scoreBar(_erpPts,25,_erpPts===25?'var(--green)':_erpPts>=18?'var(--amber)':'var(--red)')}
        <div style="font-size:12px;color:#e8eef8;margin-bottom:3px">Erros de log
            <span style="float:right;color:${_logPts===20?'var(--green)':_logPts>=10?'var(--amber)':'var(--red)'}">${_logPts}/20 pts ${_logPts<20?`⚠ (${l.erros_log||0} erros)`:''}</span>

        </div>

        ${_ipPen<0?`<div style="font-size:12px;color:var(--red);margin-top:4px">IP divergente: penalidade -20pts ⚠</div>`:''}
        <div style="border-top:1px solid var(--border);margin-top:8px;padding-top:8px;font-size:11px;color:#8096b8">
            Para chegar a 100%: ${[

    if (corrs.length === 0) {
        diagHtml += `<div class="corr-item corr-info">
            <div class="corr-titulo" style="color:var(--green)">✓ Nenhum problema detectado</div>

        </div>`;
    } else {
        const catIcon = c => ({
            score:'📊', impressao:'🖨', erp:'⇄', rede:'🌐',
            internet:'☁', maquina:'💻', geral:'✓'
        }[c.categoria||'geral']||'•');

        const renderCorr = (lista, cls, cor, titulo_sec) => {
            if (!lista.length) return '';
            let html = `<div class="sec-t" style="margin-bottom:10px">${titulo_sec} (${lista.length})</div>`;
            lista.forEach(c => {
                html += `<div class="corr-item ${cls}">
                    <div class="corr-titulo" style="color:${cor};display:flex;align-items:center;gap:6px">

                    <div class="corr-detalhe" style="margin-top:5px">${h(c.detalhe)}</div>
                    ${c.acao?`<div class="corr-acao" style="margin-top:5px;padding:5px 8px;background:rgba(255,255,255,.04);border-radius:5px">
                        💡 ${h(c.acao)}
                    </div>`:''}
                </div>`;

            return html;
        };

        diagHtml += renderCorr(corrCrit,  'corr-crit',  'var(--red)',   '🔴 O que está causando problemas');
        diagHtml += renderCorr(corrAviso, 'corr-aviso', 'var(--amber)', '🟡 Pontos de atenção');
        diagHtml += renderCorr(corrInfo,  'corr-info',  'var(--blue-l)','ℹ Informativo');
    }

    // Nota sobre o snapshot
    diagHtml += `<div style="font-size:11px;color:#505068;margin-top:12px;text-align:right">
        Análise baseada no snapshot de ${new Date(l.criado_em).toLocaleString('pt-BR')}
    </div>`;

    document.getElementById('tab-diagnostico').innerHTML = diagHtml;

    // ── Tab Máquina ──────────────────────────────────────────────────────────
    const maq = pay.maquina;

        document.getElementById('tab-maquina').innerHTML = `

            <div class="row"><span class="rl">Hostname</span><span class="rv">${h(maq.host||'—')}</span></div>
            <div class="row"><span class="rl">Sistema Operacional</span><span class="rv">${h(maq.so||'—')}</span></div>
            <div class="row"><span class="rl">Build Windows</span><span class="rv">${h(maq.build||'—')}</span></div>

        </div>
        <div class="sec"><div class="sec-t">discos</div>
            ${(maq.discos||[]).map(d=>{

                        <div class="bar-track" style="width:80px"><div class="bar-fill" style="width:${d.pct}%;background:${dc}"></div></div>

    }

    // ── Tab Configuração do Agente — simples por loja ────────────────────────
    const flags = [
        { chave: 'autocorrecao_ip',      label: 'Autocorreção de IP',          desc: 'Sincroniza o IP automaticamente quando divergente ou vazio' },

        { chave: 'autocorrecao_mysql',   label: 'Reinício automático do MySQL', desc: 'Reinicia o MySQL quando cair, aguardando 5min após boot' },

        { chave: 'autocorrecao_deadlock', label: 'Limpeza preventiva de Deadlock MySQL',

        { chave: 'coleta_latencia',      label: 'Medição de latência de rede',  desc: 'Mede latência a cada 30s (gateway, internet, API, servidor)' },
        { chave: 'coleta_maquina',       label: 'Performance da máquina',       desc: 'Coleta CPU, RAM e disco a cada snapshot' },
        { chave: 'coleta_tablets',       label: 'Status dos tablets',           desc: 'Coleta dados e faz ping nos tablets a cada snapshot' },
    ];

    // Carregar config específica desta loja
    const cfgLoja = {};
    try {
        const cfgRows = await sb('agente_config',
            `?token_loja=eq.${encodeURIComponent(l.token_loja)}&select=chave,valor`
        );
        (cfgRows||[]).forEach(r => { cfgLoja[r.chave] = r.valor; });
        _cfgLojaAtual = {...cfgLoja}; // espelhar para uso nas funções de ativar/desativar
    } catch(e) {}

    // Regra simples: se há config específica usa ela, senão padrão é ATIVO
    // Defaults por flag — flags de ação pontual ou diagnóstico são false por padrão
    const _defaults = {
        atualizar_agora:   'false',
        teste_rede_ativo:  'false',
        teste_rede_inicio: '',

    const getValor = chave => cfgLoja[chave] ?? _defaults[chave] ?? 'true';
    const temExcecao = chave => chave in cfgLoja;

    let configHtml = `
        <div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-size:12px;color:#a0b8d0;margin-bottom:16px;line-height:1.6">
            Todos os recursos ficam <b style="color:var(--green)">ativos por padrão</b> em todas as lojas.<br>

        </div>
        <div style="display:grid;gap:8px">
        ${flags.map(f => {
            if (f.tipo === 'texto') {
                // Flag de texto (ex: horário HH:MM)
                const valorAtual = getValor(f.chave) || '';
                return `<div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:12px">
                    <div style="flex:1">
                        <div style="font-size:13px;font-weight:600;color:#e8eef8">${h(f.label)}</div>
                        <div style="font-size:11px;color:#8096b8;margin-top:3px">${h(f.desc)}</div>
                    </div>
                    <input type="time" value="${h(valorAtual)}"
                        style="background:var(--bg2);border:1px solid var(--border);color:#e8eef8;padding:5px 10px;border-radius:6px;font-size:13px;font-family:var(--mono);width:110px"
                        onchange="salvarFlagTexto('${h(l.token_loja)}','${f.chave}',this.value)">
                </div>`;
            }
            const ativo = getValor(f.chave) !== 'false';
            const excecao = temExcecao(f.chave);
            return `<div data-flag-card style="background:var(--bg3);border:1px solid ${ativo?'var(--border)':'rgba(255,68,85,.2)'};border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:12px">
                <div style="flex:1">
                    <div data-flag-nome style="font-size:13px;font-weight:600;color:${ativo?'#e8eef8':'#8096b8'}">
                        ${h(f.label)}
                        ${excecao && !ativo ? `<span style="background:rgba(255,68,85,.12);color:#ff9aaa;font-size:10px;padding:1px 6px;border-radius:4px;margin-left:6px;font-weight:400">desativado nesta loja</span>` : ''}
                    </div>

                        style="background:${ativo?'var(--green)':'rgba(255,68,85,.2)'};border:none;color:${ativo?'#0a0a1a':'#ff6b7a'};padding:5px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:700;min-width:60px;transition:background .2s,color .2s">

                        style="background:rgba(255,255,255,.05);border:1px solid var(--border);color:#8096b8;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:11px">
                        ↺ padrão
                    </button>` : ''}

        </div>
        <div id="config-status" style="margin-top:12px;font-size:12px;text-align:center;color:#8096b8"></div>

        <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border)">
            <div style="font-size:11px;font-weight:700;color:#a0b8d0;text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px">📶 Modo Teste de Rede</div>
            <div id="widget-teste-rede">${renderWidgetTesteRede(getValor, h, l.token_loja)}</div>
        </div>`;

    document.getElementById('tab-autocorrecoes').innerHTML = '<div class="loading">Buscando histórico...</div>';

    const rowsAC = await sb('snapshots',
        `?token_loja=eq.${encodeURIComponent(l.token_loja)}&order=criado_em.desc&limit=200`
    );

    todasAC.sort((a,b) => new Date(b.horario||b.snapshot_em) - new Date(a.horario||a.snapshot_em));

    // Resumo por tipo
    const resumoTipos = {};
    todasAC.forEach(a => {

        if (!resumoTipos[tipo]) resumoTipos[tipo] = { sucesso: 0, falhou: 0 };

        else resumoTipos[tipo].falhou++;

    const tipoLabel = t => ({
        'ip_sincronizado':   '🔄 Sincronização de IP',

        acHtml += `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:16px">

                    <div style="font-size:12px;font-weight:700;color:#e8eef8;margin-bottom:6px">${tipoLabel(tipo)}</div>

                        <span style="color:var(--green)">✓ ${cnt.sucesso}</span>
                        ${cnt.falhou>0?`<span style="color:var(--red)">✗ ${cnt.falhou}</span>`:''}
                    </div>

            ).join('')}
        </div>`;

        // Linha do tempo

// ── Funções de exportação ─────────────────────────────────────────────────────
async function exportarLoja() {
    if (!_tokenAtual) return;
    const nome    = document.getElementById('m-titulo')?.textContent || 'loja';
    const nomeArq = nome.replace(/[^a-zA-Z0-9]/g,'_').toLowerCase();

        abaResumo.push(['SO', pay.maquina.so||'—', 'Hostname', pay.maquina.host||'—']);
        const disco = (pay.maquina.discos||[])[0];

    }

        const lt = pay.latencia;

    const erroHdr = ['Tipo','Mensagem','Frequência','Última Ocorrência'];

// ── Inativar / reativar lojas ─────────────────────────────────────────────────
async function bloquearLoja() {
    const token = _tokenAtual;
    if (!token) return;
    const nome   = document.getElementById('m-titulo')?.textContent || 'Loja';
    const motivo = prompt(`Motivo da inativação de "${nome}":\n\nExemplo: Cancelamento de contrato, Loja encerrada`, 'Cancelamento de contrato');
    if (motivo === null) return;

    const r = await fetch(`${SB_URL}/rest/v1/lojas_bloqueadas`, {
        method: 'POST',
        headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`,
                   'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates,return=minimal' },
        body: JSON.stringify({ token_loja: token, nome_loja: nome, motivo: motivo||'Sem motivo informado', bloqueado_por: 'NOC' })
    });
    if (r.ok) {
        _lojasBloqueadas.push({ token_loja: token, nome_loja: nome, motivo: motivo||'', bloqueado_em: new Date().toISOString(), bloqueado_por: 'NOC' });
        document.getElementById('overlay').classList.remove('on');
        await carregar();
        alert(`✓ "${nome}" inativada.\nO agente parará de enviar snapshots no próximo ciclo (até 5 minutos).\n\nPara reativar: use o filtro "⊘ Inativas" e clique em "✓ reativar loja".`);
    } else {
        const errTxt = await r.text().catch(()=>'');
        console.error('Erro ao inativar loja:', r.status, errTxt);
        alert(`Erro ao inativar a loja (status ${r.status}).\nVerifique a conexão com o Supabase e tente novamente.`);
    }
}

async function desbloquearLoja() {
    const token = _tokenAtual;
    if (!token) return;
    const nome = document.getElementById('m-titulo')?.textContent || 'Loja';
    if (!confirm(`Reativar "${nome}"?\n\nO agente voltará a enviar snapshots no próximo ciclo.`)) return;

    const r = await fetch(`${SB_URL}/rest/v1/lojas_bloqueadas?token_loja=eq.${encodeURIComponent(token)}`,
        { method: 'DELETE', headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Prefer': 'return=minimal' } }
    );
    if (r.ok) {
        _lojasBloqueadas = _lojasBloqueadas.filter(b => b.token_loja !== token);
        document.getElementById('overlay').classList.remove('on');
        await carregar();
        alert(`✓ "${nome}" reativada. O agente voltará a enviar snapshots no próximo ciclo (até 5 minutos).`);
    } else {
        alert('Erro ao reativar a loja. Tente novamente.');
    }
}

// ── Funções de erros históricos ───────────────────────────────────────────────
function atalhoErros(dias, token) {
    const ate  = new Date();
    const de   = new Date(); de.setDate(de.getDate() - dias);
    const fmt  = d => d.toISOString().slice(0,16);
    document.getElementById('erros-de').value  = fmt(de);
    document.getElementById('erros-ate').value = fmt(ate);
    buscarErrosHistorico(token);
}

async function buscarErrosHistorico(token) {
    const de  = document.getElementById('erros-de')?.value;
    const ate = document.getElementById('erros-ate')?.value;
    const el  = document.getElementById('erros-resultado');
    if (!el) return;
    el.innerHTML = '<div class="loading">Buscando...</div>';

    let q = `?token_loja=eq.${encodeURIComponent(token)}&order=criado_em.desc&limit=50`;
    if (de)  q += `&criado_em=gte.${new Date(de).toISOString()}`;
    if (ate) q += `&criado_em=lte.${new Date(ate).toISOString()}`;

    const rows = await sb('snapshots', q);
    if (!rows?.length) { el.innerHTML = '<div class="empty">Nenhum dado no período.</div>'; return; }

    const todos = [];
    rows.forEach(r => {
        (r.payload?.top_erros||[]).forEach(e => todos.push({ ...e, snap_em: r.criado_em }));
    });

    const agrupado = {};
    todos.forEach(e => {
        const k = e.msg_resumo||e.message||'?';
        if (!agrupado[k]) agrupado[k] = { tipo: e.type||'?', msg: k, total: 0, ultima: e.snap_em };
        agrupado[k].total += (e.total||1);
        if (e.snap_em > agrupado[k].ultima) agrupado[k].ultima = e.snap_em;
    });

    const lista = Object.values(agrupado).sort((a,b) => b.total - a.total).slice(0,30);
    if (!lista.length) { el.innerHTML = '<div class="empty">Nenhum erro no período.</div>'; return; }

    el.innerHTML = lista.map(e => `
        <div class="erro-item">
            <div class="erro-msg">${h(e.msg)}</div>
            <div class="erro-meta">
                <span style="color:var(--amber)">${h(e.tipo)}</span>
                <span>${e.total}× ocorrências</span>
                <span>${new Date(e.ultima).toLocaleString('pt-BR')}</span>
            </div>
        </div>`).join('');
}

// ── Funções de histórico ──────────────────────────────────────────────────────
function atalhoHist(dias, token) {
    const ate = new Date();
    const de  = new Date(); de.setDate(de.getDate() - dias);
    const fmt = d => d.toISOString().slice(0,16);
    document.getElementById('hist-de').value  = fmt(de);
    document.getElementById('hist-ate').value = fmt(ate);
    buscarHistorico(token);
}

async function buscarHistorico(token) {
    const de  = document.getElementById('hist-de')?.value;
    const ate = document.getElementById('hist-ate')?.value;
    const el  = document.getElementById('hist-resultado');
    if (!el) return;
    el.innerHTML = '<div class="loading">Buscando...</div>';

    let q = `?token_loja=eq.${encodeURIComponent(token)}&order=criado_em.desc&limit=200`;
    if (de)  q += `&criado_em=gte.${new Date(de).toISOString()}`;
    if (ate) q += `&criado_em=lte.${new Date(ate).toISOString()}`;

    const rows = await sb('snapshots', q);
    if (!rows?.length) { el.innerHTML = '<div class="empty">Nenhum dado no período.</div>'; return; }

    const scores = rows.map(r => r.score||0);
    const min    = Math.min(...scores), max = Math.max(...scores);
    const barH   = 48;

    const histHTML = `<div class="hist">${rows.map(r => {
        const pct  = max>min ? Math.round((r.score-min)/(max-min)*barH) : barH/2;
        const cor  = r.score>=80?'var(--green)':r.score>=60?'var(--amber)':'var(--red)';
        const dt   = new Date(r.criado_em).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
        return `<div class="hist-bar" style="height:${Math.max(4,pct)}px;background:${cor}" title="${dt}: ${r.score||0}%"></div>`;
    }).join('')}</div>`;

    const tabelaHTML = `<table style="width:100%;border-collapse:collapse;font-size:11px">
        <thead><tr style="background:var(--bg3)">
            ${['Data/Hora','Score','Status','Servidor','Erros','Sem ERP','IP Máquina','IP Configurado'].map(c=>`<th style="padding:6px 8px;text-align:left;color:#a0b8d0;font-weight:600;border-bottom:1px solid var(--border)">${c}</th>`).join('')}
        </tr></thead>
        <tbody>${rows.map((r,i) => {
            const p   = r.payload||{};
            const cor = r.score>=80?'var(--green)':r.score>=60?'var(--amber)':'var(--red)';
            const bg  = i%2===0?'var(--bg3)':'transparent';
            return `<tr style="background:${bg}">
                <td style="padding:5px 8px;color:#8096b8;font-family:var(--mono);font-size:10px">${new Date(r.criado_em).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</td>
                <td style="padding:5px 8px;font-weight:700;color:${cor}">${r.score||0}%</td>
                <td style="padding:5px 8px;color:#e8eef8">${r.status||r.nota||'?'}</td>
                <td style="padding:5px 8px;color:${r.servidor_online?'var(--green)':'var(--red)'}">${r.servidor_online?'Online':'Offline'}</td>
                <td style="padding:5px 8px;color:${(r.erros_log||0)>100?'var(--red)':(r.erros_log||0)>50?'var(--amber)':'var(--green)'}">${r.erros_log||0}</td>
                <td style="padding:5px 8px;color:${(r.retry_expirados||0)>0?'var(--red)':'#8096b8'}">${r.retry_expirados||0}</td>
                <td style="padding:5px 8px;color:#8096b8;font-family:var(--mono);font-size:10px">${r.ip_servidor||p.ip_servidor||'—'}</td>
                <td style="padding:5px 8px;color:#8096b8;font-family:var(--mono);font-size:10px">${p.ip_configurado||'—'}</td>
            </tr>`;
        }).join('')}</tbody>
    </table>`;

    el.innerHTML = histHTML + tabelaHTML;
}

// ── Topologia de rede ─────────────────────────────────────────────────────────
let nocTopoScale=1, nocVX=0, nocVY=0;
let nocDragging=null, nocNodes={};
let nocPanActive=false, nocPanSX=0, nocPanSY=0, nocPanVX=0, nocPanVY=0;
let nocSpaceDown=false;
let _nocTablets=[], _nocImps=[], _nocIP='', _nocLatencia=null;
let _nocPanIntervals={};
let _nocTopoContainer = null;

document.addEventListener('keydown', e => { if(e.code==='Space'&&e.target.tagName!=='INPUT') { nocSpaceDown=true; e.preventDefault(); } });
document.addEventListener('keyup',   e => { if(e.code==='Space') nocSpaceDown=false; });

function applyNocTransform(){
    const g=document.getElementById('topo-noc-g');
    if(g) g.setAttribute('transform',`translate(${nocVX},${nocVY}) scale(${nocTopoScale})`);
}

function nocTopoZoom(d){
    nocTopoScale=Math.max(0.25,Math.min(3,nocTopoScale+d));
    applyNocTransform();
}

function nocTopoCentralizar(){
    const wrap = _nocTopoContainer || document.getElementById('topo-noc-wrap');
    if (!wrap) return;
    const keys = Object.keys(nocNodes);
    if (!keys.length) { nocVX=0; nocVY=0; nocTopoScale=1; applyNocTransform(); return; }
    const xs = keys.map(k=>nocNodes[k].x), ys = keys.map(k=>nocNodes[k].y);
    const minX=Math.min(...xs), maxX=Math.max(...xs), minY=Math.min(...ys), maxY=Math.max(...ys);
    const W=wrap.clientWidth||800, H=wrap.clientHeight||480;
    const pad=80, cW=maxX-minX+pad*2, cH=maxY-minY+pad*2;
    nocTopoScale = Math.min(W/cW, H/cH, 1.5);
    nocVX = W/2 - ((minX+maxX)/2)*nocTopoScale;
    nocVY = H/2 - ((minY+maxY)/2)*nocTopoScale;
    applyNocTransform();
}

function nocRegistrarEventos(container, svg) {
    container.onmousedown  = null;
    container.onmousemove  = null;
    container.onmouseup    = null;
    container.onmouseleave = null;
    container.oncontextmenu= null;
    container.onwheel      = null;

    container.onmousedown = e => {
        if(e.button===2||e.button===1||nocSpaceDown){
            nocPanActive=true; nocPanSX=e.clientX; nocPanSY=e.clientY;
            nocPanVX=nocVX; nocPanVY=nocVY; container.style.cursor='grabbing'; e.preventDefault();
        }
    };
    container.onmousemove = e => {
        if(nocPanActive){
            nocVX=nocPanVX+(e.clientX-nocPanSX); nocVY=nocPanVY+(e.clientY-nocPanSY);
            applyNocTransform();
        }
        if(nocDragging){
            const rect=container.getBoundingClientRect();
            nocNodes[nocDragging]={x:(e.clientX-rect.left-nocVX)/nocTopoScale, y:(e.clientY-rect.top-nocVY)/nocTopoScale};
            renderTopoNoc(_nocTablets,_nocImps,_nocIP,_nocLatencia);
        }
    };
    container.onmouseup    = () => { nocPanActive=false; nocDragging=null; container.style.cursor='default'; };
    container.onmouseleave = () => { nocPanActive=false; nocDragging=null; };
    container.oncontextmenu= e => e.preventDefault();
    container.onwheel      = e => { e.preventDefault(); nocTopoZoom(e.deltaY<0?.1:-.1); };

    svg.querySelectorAll('.noc-node').forEach(el=>{
        el.onmousedown = e => {
            if(e.button!==0||nocSpaceDown) return;
            e.stopPropagation(); nocDragging=el.dataset.nid; container.style.cursor='grabbing';
        };
    });

    const bp=document.getElementById('btn-topo-plus');
    const bm=document.getElementById('btn-topo-minus');
    const bf=document.getElementById('btn-topo-fit');
    if(bp) { bp.onclick=()=>nocTopoZoom(.15); }
    if(bm) { bm.onclick=()=>nocTopoZoom(-.15); }
    if(bf) { bf.onclick=()=>nocTopoCentralizar(); }
}

function topoMaximizar() {
    const wrap = document.getElementById('topo-noc-wrap');
    const svg  = document.getElementById('topo-noc-svg');
    if (!wrap || !svg) return;

    const ov = document.createElement('div');
    ov.id = 'topo-max-overlay';
    ov.style.cssText = 'position:fixed;inset:0;z-index:200;background:var(--bg);display:flex;flex-direction:column';

    const hd = document.createElement('div');
    hd.style.cssText = 'padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;gap:8px;flex-wrap:wrap';
    hd.innerHTML = `
        <span style="font-weight:700;color:#e8eef8;font-size:13px">Topologia de Rede</span>
        <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
            <span style="font-size:11px;color:#8096b8">arraste nó · scroll zoom · espaço+arraste pan</span>
            <button onclick="nocTopoZoom(1.2)" style="background:var(--bg3);border:1px solid var(--border);color:#e8eef8;width:30px;height:30px;border-radius:5px;cursor:pointer;font-size:15px">+</button>
            <button onclick="nocTopoZoom(0.8)" style="background:var(--bg3);border:1px solid var(--border);color:#e8eef8;width:30px;height:30px;border-radius:5px;cursor:pointer;font-size:15px">−</button>
            <button onclick="nocTopoCentralizar()" style="background:var(--bg3);border:1px solid var(--border);color:#e8eef8;padding:0 12px;height:30px;border-radius:5px;cursor:pointer;font-size:11px">⊙ centralizar</button>
            <div style="display:flex;gap:4px">
                <button onpointerdown="nocPanBtn('up',true)"    onpointerup="nocPanBtn('up',false)"    onpointerleave="nocPanBtn('up',false)"    style="background:var(--bg3);border:1px solid var(--border);color:#e8eef8;width:28px;height:28px;border-radius:5px;cursor:pointer;font-size:12px;touch-action:none">▲</button>
                <button onpointerdown="nocPanBtn('left',true)"  onpointerup="nocPanBtn('left',false)"  onpointerleave="nocPanBtn('left',false)"  style="background:var(--bg3);border:1px solid var(--border);color:#e8eef8;width:28px;height:28px;border-radius:5px;cursor:pointer;font-size:12px;touch-action:none">◀</button>
                <button onpointerdown="nocPanBtn('down',true)"  onpointerup="nocPanBtn('down',false)"  onpointerleave="nocPanBtn('down',false)"  style="background:var(--bg3);border:1px solid var(--border);color:#e8eef8;width:28px;height:28px;border-radius:5px;cursor:pointer;font-size:12px;touch-action:none">▼</button>
                <button onpointerdown="nocPanBtn('right',true)" onpointerup="nocPanBtn('right',false)" onpointerleave="nocPanBtn('right',false)" style="background:var(--bg3);border:1px solid var(--border);color:#e8eef8;width:28px;height:28px;border-radius:5px;cursor:pointer;font-size:12px;touch-action:none">▶</button>
            </div>
            <button onclick="fecharTopoMaximizar()" style="background:rgba(255,68,85,.15);border:1px solid rgba(255,68,85,.3);color:#ff6b7a;padding:0 12px;height:30px;border-radius:5px;cursor:pointer;font-size:11px">✕ fechar</button>
        </div>`;

    const cnt = document.createElement('div');
    cnt.id  = 'topo-max-cnt';
    cnt.style.cssText = 'flex:1;overflow:hidden;position:relative;background:var(--bg3)';

    ov.appendChild(hd);
    ov.appendChild(cnt);
    document.body.appendChild(ov);

    cnt.appendChild(svg);
    svg.style.width  = '100%';
    svg.style.height = '100%';

    _nocTopoContainer = cnt;
    nocRegistrarEventos(cnt, svg);
    nocTopoCentralizar();

    const onEsc = e => { if (e.key === 'Escape') fecharTopoMaximizar(); };
    document.addEventListener('keydown', onEsc);
    ov._onEsc = onEsc;
}

function fecharTopoMaximizar() {
    const ov   = document.getElementById('topo-max-overlay');
    const wrap = document.getElementById('topo-noc-wrap');
    const svg  = document.getElementById('topo-noc-svg');
    if (!ov || !wrap || !svg) return;
    if (ov._onEsc) document.removeEventListener('keydown', ov._onEsc);
    wrap.appendChild(svg);
    svg.style.width  = '100%';
    svg.style.height = '100%';
    _nocTopoContainer = wrap;
    nocRegistrarEventos(wrap, svg);
    ov.remove();
    setTimeout(nocTopoCentralizar, 100);
}

function nocPanBtn(dir, active) {
    clearInterval(_nocPanIntervals[dir]);
    if (!active) return;
    const step = () => {
        const d = 18;
        if (dir==='up')    nocVY += d;
        if (dir==='down')  nocVY -= d;
        if (dir==='left')  nocVX += d;
        if (dir==='right') nocVX -= d;
        applyNocTransform();
    };
    step();
    _nocPanIntervals[dir] = setInterval(step, 80);
}

function renderTopoNoc(tablets, imps, serverIp, latencia) {
    _nocTablets=tablets; _nocImps=imps; _nocIP=serverIp; if(latencia!==undefined) _nocLatencia=latencia;
    const wrap = _nocTopoContainer || document.getElementById('topo-noc-wrap');
    const svg  = document.getElementById('topo-noc-svg');
    if(!wrap||!svg) return;

    const W=1000, H=700, cx=W/2;

    if(Object.keys(nocNodes).length===0){
        nocTopoScale=1; nocVX=0; nocVY=0;
    }

    const posGW  = nocNodes['gw']  || {x:cx, y:80};
    const posSRV = nocNodes['srv'] || {x:cx, y:210};
    nocNodes['gw']  = posGW;
    nocNodes['srv'] = posSRV;

    const ativos  = tablets.filter(t=>t.ip&&t.ip!=='null');
    // Usar i.tipo quando disponível (agente novo), fallback para regex URI (snapshots antigos)
    const impRede = imps.filter(i=> i.tipo ? i.tipo==='rede' : i.uri?.match(/\d+\.\d+\.\d+\.\d+/) && !i.uri?.includes('localhost'));
    const impUsb  = imps.filter(i=> i.tipo ? i.tipo!=='rede' : !i.uri?.match(/\d+\.\d+\.\d+\.\d+/) || i.uri?.includes('localhost'));

    ativos.forEach((t,i) => {
        if(!nocNodes['t'+i]){
            const tot=ativos.length, frac=tot===1?.5:i/(tot-1);
            const r=Math.max(240,100+tot*55);
            const ang=-Math.PI*.85+frac*Math.PI*.7;
            nocNodes['t'+i]={x:cx-70+r*Math.cos(ang), y:340+r*.55*Math.sin(ang)};
        }
    });
    impRede.forEach((p,i) => {
        if(!nocNodes['ir'+i]){
            const tot=impRede.length, frac=tot===1?.5:i/(tot-1);
            const r=Math.max(230,100+tot*65);
            const ang=-Math.PI*.15-frac*Math.PI*.7;
            nocNodes['ir'+i]={x:cx+70+r*Math.cos(ang), y:340+r*.5*Math.sin(ang)};
        }
    });
    impUsb.forEach((p,i) => {
        if(!nocNodes['iu'+i]) nocNodes['iu'+i]={x:cx+160+i*130, y:220};
    });

    const all=['gw','srv',...ativos.map((_,i)=>'t'+i),...impRede.map((_,i)=>'ir'+i),...impUsb.map((_,i)=>'iu'+i)];
    for(let it=0;it<25;it++){
        for(let a=0;a<all.length;a++) for(let b=a+1;b<all.length;b++){
            const na=nocNodes[all[a]],nb=nocNodes[all[b]];
            if(!na||!nb) continue;
            const dx=nb.x-na.x,dy=nb.y-na.y,dist=Math.sqrt(dx*dx+dy*dy);
            if(dist<160&&dist>0){
                const push=(160-dist)/2,nx=dx/dist*push,ny=dy/dist*push;
                if(!['gw','srv'].includes(all[b])){nb.x+=nx;nb.y+=ny;}
                if(!['gw','srv'].includes(all[a])){na.x-=nx;na.y-=ny;}
            }
        }
    }

    const sCor=p=>!p||p.status==='sem_ip'?'#505068':p.status==='sem resposta'||p.perda===100?'#ff4455':p.latencia>150?'#ffb830':'#00d68f';
    const lLbl=p=>!p||p.status==='sem_ip'?'—':p.status==='sem resposta'?'offline':p.latencia?p.latencia+'ms':'…';

    let g=``;

    // Latência da internet e do gateway vindas do payload
    const _lat = _nocLatencia || latencia || {};
    const latGW  = _lat.gateway  ? { ms: _lat.gateway.med,  cor: _lat.gateway.med<50?'#00d68f':_lat.gateway.med<150?'#ffb830':'#ff4455',  txt: _lat.gateway.med+'ms'  } : null;
    const latWAN = _lat.internet ? { ms: _lat.internet.med, cor: _lat.internet.med<80?'#00d68f':_lat.internet.med<200?'#ffb830':'#ff4455', txt: _lat.internet.med+'ms' } : null;

    g+=`<circle cx="${cx}" cy="16" r="14" fill="#0d1626" stroke="rgba(255,255,255,.15)" stroke-width="1.5"/>`;
    g+=`<text x="${cx}" y="21" text-anchor="middle" fill="#b0c4de" font-size="13">☁</text>`;

    // Linha Internet→GW com latência WAN
    const corWAN = latWAN ? latWAN.cor : 'rgba(255,255,255,.12)';
    g+=`<line x1="${cx}" y1="30" x2="${cx}" y2="${posGW.y-32}" stroke="${corWAN}" stroke-width="${latWAN?2:1.5}" stroke-dasharray="5,3"/>`;
    if (latWAN) {
        const myWAN = (30 + posGW.y - 32) / 2;
        const wWAN  = latWAN.txt.length * 6.5 + 8;
        g+=`<rect x="${cx - wWAN/2}" y="${myWAN-9}" width="${wWAN}" height="18" rx="4" fill="#0a1020" opacity=".92"/>`;
        g+=`<text x="${cx}" y="${myWAN+5}" text-anchor="middle" fill="${latWAN.cor}" font-size="11" font-family="monospace" font-weight="600">${latWAN.txt}</text>`;
    }

    // Linha GW→SRV com latência gateway
    const corGW = latGW ? latGW.cor : '#4d8fff';
    g+=`<line x1="${cx}" y1="${posGW.y+32}" x2="${cx}" y2="${posSRV.y-32}" stroke="${corGW}" stroke-width="2.5"/>`;
    if (latGW) {
        const myGW = (posGW.y + 32 + posSRV.y - 32) / 2;
        const wGW  = latGW.txt.length * 6.5 + 8;
        g+=`<rect x="${cx - wGW/2}" y="${myGW-9}" width="${wGW}" height="18" rx="4" fill="#0a1020" opacity=".92"/>`;
        g+=`<text x="${cx}" y="${myGW+5}" text-anchor="middle" fill="${latGW.cor}" font-size="11" font-family="monospace" font-weight="600">${latGW.txt}</text>`;
    }

    ativos.forEach((t,i)=>{
        const pt=nocNodes['t'+i],cor=sCor(t.ping);
        g+=`<line x1="${cx}" y1="${posSRV.y+32}" x2="${pt.x}" y2="${pt.y-34}" stroke="${cor}" stroke-width="1.8" opacity=".8"/>`;
        const mx=(cx+pt.x)/2,my=(posSRV.y+34+pt.y-34)/2;
        const ll=lLbl(t.ping);
        g+=`<rect x="${mx-14}" y="${my-9}" width="${ll.length*6.5+6}" height="18" rx="4" fill="#0a1020" opacity=".9"/>`;
        g+=`<text x="${mx-11}" y="${my+5}" fill="${cor}" font-size="11" font-family="monospace" font-weight="600">${ll}</text>`;
    });

    impRede.forEach((p,i)=>{
        const pp=nocNodes['ir'+i];
        g+=`<line x1="${cx}" y1="${posSRV.y+32}" x2="${pp.x}" y2="${pp.y-32}" stroke="#00d68f" stroke-width="1.8" opacity=".7"/>`;
    });

    impUsb.forEach((p,i)=>{
        const pp=nocNodes['iu'+i];
        g+=`<line x1="${cx}" y1="${posSRV.y}" x2="${pp.x}" y2="${pp.y+32}" stroke="#7c5cfc" stroke-width="1.5" stroke-dasharray="6,3" opacity=".8"/>`;
        const mx=(cx+pp.x)/2,my=(posSRV.y+pp.y)/2;
        g+=`<rect x="${mx-16}" y="${my-9}" width="34" height="18" rx="4" fill="#0a1020" opacity=".9"/>`;
        g+=`<text x="${mx}" y="${my+5}" text-anchor="middle" fill="#7c5cfc" font-size="11" font-family="monospace" font-weight="600">USB</text>`;
    });

    const nodo=(pos,cor,l1,l2,icon,nid)=>{
        const NW=120,NH=72,x=pos.x-NW/2,y=pos.y-NH/2;
        const drag=nid?`class="noc-node" data-nid="${nid}" style="cursor:grab"`:'';
        return `<g ${drag}>
            <rect x="${x}" y="${y}" width="${NW}" height="${NH}" rx="10" fill="#0d1626" stroke="${cor}" stroke-width="2"/>
            <text x="${pos.x}" y="${pos.y-10}" text-anchor="middle" fill="${cor}" font-size="16">${icon}</text>
            <text x="${pos.x}" y="${pos.y+9}" text-anchor="middle" fill="#e8eef8" font-size="12" font-weight="700" font-family="monospace">${h(l1)}</text>
            <text x="${pos.x}" y="${pos.y+24}" text-anchor="middle" fill="#c8d8e8" font-size="10" font-family="monospace">${h(l2||'')}</text>
        </g>`;
    };

    g+=nodo(posGW,'#4d8fff','gateway','','⌘','');
    g+=nodo(posSRV,'#0e5cfe',serverIp||'servidor','servidor','⬡','');

    ativos.forEach((t,i)=>{
        const pt=nocNodes['t'+i],cor=sCor(t.ping);
        const bat=parseInt(t.bateria||0),bc=bat<20?'#ff4455':bat<40?'#ffb830':'#00d68f';
        const NW=120,NH=76,x=pt.x-NW/2,y=pt.y-NH/2;
        g+=`<g class="noc-node" data-nid="t${i}" style="cursor:grab">
            <rect x="${x}" y="${y}" width="${NW}" height="${NH}" rx="10" fill="#0d1626" stroke="${cor}" stroke-width="2"/>
            <text x="${pt.x}" y="${pt.y-11}" text-anchor="middle" fill="${cor}" font-size="15">📱</text>
            <text x="${pt.x}" y="${pt.y+7}" text-anchor="middle" fill="#e8eef8" font-size="12" font-weight="700" font-family="monospace">${t.mesa?`Mesa ${t.mesa}`:h((t.ip||'').split('.').slice(-1)[0]?'...'+t.ip.split('.').slice(-1)[0]:'?')}</text>
            <text x="${pt.x}" y="${pt.y+22}" text-anchor="middle" fill="#c8d8e8" font-size="10" font-family="monospace">${h(t.ip||'sem IP')}</text>
            ${bat>0?`<rect x="${x+NW-30}" y="${y+5}" width="24" height="12" rx="2" fill="#0d1626" stroke="${bc}" stroke-width="1.3"/>
            <rect x="${x+NW-29}" y="${y+6}" width="${Math.round(bat/100*22)}" height="10" rx="1" fill="${bc}" opacity=".85"/>
            <text x="${pt.x+NW/2-20}" y="${y+23}" text-anchor="middle" fill="${bc}" font-size="9" font-family="monospace">${bat}%</text>`:''}
        </g>`;
    });

    impRede.forEach((p,i)=>{
        const pp=nocNodes['ir'+i];
        g+=nodo(pp,'#00d68f',h((p.nome||'').slice(0,12)),h((p.uri||'').match(/(\d+\.\d+\.\d+\.\d+)/)?.[1]||'rede'),'🖨','ir'+i);
    });
    impUsb.forEach((p,i)=>{
        const pp=nocNodes['iu'+i];
        g+=nodo(pp,'#7c5cfc',h((p.nome||'').slice(0,12)),'USB','🖨','iu'+i);
    });

    svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
    svg.innerHTML = `<defs><filter id="nf"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><g id="topo-noc-g">${g}</g>`;

    applyNocTransform();
    nocRegistrarEventos(wrap, svg);

    setTimeout(() => {
        nocTopoCentralizar();
        setTimeout(nocTopoCentralizar, 200);
    }, 100);
}

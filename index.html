<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Goomer NOC</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
:root{
  --bg:#04080f;--bg2:#080f1c;--bg3:#0d1626;--bg4:#111e33;
  --border:rgba(14,92,254,0.15);--border2:rgba(14,92,254,0.3);
  --text:#e8eef8;--sub:#8096b8;--muted:#3a4f72;
  --green:#00d68f;--blue:#0e5cfe;--blue-l:#4d8fff;
  --amber:#ffb830;--red:#ff4455;--purple:#7c5cfc;
  --sans:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
}
body{background:var(--bg);color:#e8eef8;font-family:var(--sans);min-height:100vh}

.topbar{background:var(--blue);padding:0 16px;height:50px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 20px rgba(14,92,254,0.35)}
.logo{font-size:15px;font-weight:800;letter-spacing:.08em;color:#fff}
.logo span{font-weight:400;opacity:.7}
.topbar-right{display:flex;align-items:center;gap:14px}
#last-update{font-size:11px;color:rgba(255,255,255,0.9);font-family:var(--mono)}
.btn{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;padding:5px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;transition:.15s}
.btn:hover{background:rgba(255,255,255,0.25)}

.main{padding:16px;max-width:1600px;margin:0 auto}

/* Barra de busca e filtros */
.toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.search-input{flex:1;min-width:200px;background:var(--bg2);border:1px solid var(--border2);color:var(--text);padding:9px 14px;border-radius:8px;font-size:13px;font-family:var(--sans);outline:none}
.search-input:focus{border-color:var(--blue)}
.search-input::placeholder{color:#8096b8}
.filter-btn{background:var(--bg2);border:1px solid var(--border);color:var(--sub);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;transition:.15s}
.filter-btn:hover,.filter-btn.ativo{background:rgba(14,92,254,0.12);border-color:var(--blue);color:var(--blue-l)}

/* Resumo geral */
.resumo{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:16px}
.rc{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.rc-lbl{font-size:11px;color:#a0b8d0;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;font-weight:600}
.rc-val{font-size:24px;font-weight:800;font-family:var(--mono);line-height:1}
.rc-sub{font-size:11px;color:#a0b8d0;margin-top:4px;font-weight:500}

/* Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}

/* Card loja */
.loja{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:.18s}
.loja:hover{border-color:var(--border2);transform:translateY(-1px);box-shadow:0 6px 24px rgba(0,0,0,.3)}
.loja-head{padding:13px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.status-badge{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;border:1.5px solid}
.loja-info{flex:1;min-width:0}
.loja-nome{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.loja-ip{font-size:11px;color:var(--sub);font-family:var(--mono);margin-top:2px}
.score-circle{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;border:2.5px solid;flex-shrink:0;font-family:var(--mono)}
.loja-body{padding:12px 16px}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.kpi{background:var(--bg3);border-radius:7px;padding:7px 8px;text-align:center}
.kpi-val{font-size:16px;font-weight:700;font-family:var(--mono);line-height:1}
.kpi-lbl{font-size:10px;color:#a0b8d0;text-transform:uppercase;letter-spacing:.04em;margin-top:3px;font-weight:500}
.alertas{display:flex;flex-direction:column;gap:3px}
.al{display:flex;align-items:center;gap:6px;font-size:11px;padding:4px 8px;border-radius:5px;font-weight:500}
.al-crit{background:rgba(255,68,85,.1);color:#ff6b7a;border-left:2px solid var(--red)}
.al-warn{background:rgba(255,184,48,.08);color:#ffc94d;border-left:2px solid var(--amber)}
.al-ok{background:rgba(0,214,143,.07);color:#33e8a8;border-left:2px solid var(--green)}
.al-info{background:rgba(14,92,254,.08);color:var(--blue-l);border-left:2px solid var(--blue)}
.loja-foot{padding:7px 16px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:11px;color:#a0b8d0}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:16px 8px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.overlay.on{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:820px;margin:auto;min-width:0}
.modal-head{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;background:var(--bg2);z-index:1;border-radius:14px 14px 0 0}
.modal-close{background:none;border:none;color:var(--sub);font-size:20px;cursor:pointer;padding:2px 8px;line-height:1}
.modal-close:hover{color:var(--text)}
.modal-body{padding:20px}
.modal-tabs{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
.modal-tab{white-space:nowrap}
.modal-tab{background:var(--bg3);border:1px solid var(--border);color:var(--sub);padding:6px 14px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;transition:.15s}
.modal-tab:hover,.modal-tab.on{background:rgba(14,92,254,.15);border-color:var(--blue);color:var(--blue-l)}
.modal-panel{display:none}.modal-panel.on{display:block}
.sec{margin-bottom:18px}
.sec-t{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#8096b8;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px}
.row:last-child{border:none}
.rl{color:#a0b8d0}
.rv{font-weight:600;font-family:var(--mono);text-align:right}
/* Tab item */
.tab-card{background:var(--bg3);border-radius:8px;padding:10px 12px;margin-bottom:8px;border:1px solid var(--border)}
.tab-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.tab-nome{font-size:13px;font-weight:700}
.bar-row{display:flex;align-items:center;gap:8px;font-size:11px;color:#8096b8;margin-bottom:4px}
.bar-track{height:4px;background:var(--bg4);border-radius:2px;flex:1}
.bar-fill{height:100%;border-radius:2px}
/* Erros */
.erro-item{background:var(--bg3);border-radius:7px;padding:9px 12px;margin-bottom:6px;border-left:3px solid var(--red)}
.erro-msg{font-size:12px;color:#e8eef8;font-family:var(--mono);margin-bottom:4px;word-break:break-word;white-space:normal;line-height:1.5}
.erro-meta{font-size:10px;color:#8096b8;display:flex;gap:10px}
/* Histórico */
.hist{display:flex;align-items:flex-end;gap:3px;height:56px;margin-top:6px}
.hist-bar{flex:1;border-radius:2px 2px 0 0;min-height:2px;cursor:default}
/* Topologia mini */
.topo-mini{background:var(--bg3);border-radius:8px;padding:12px;border:1px solid var(--border);text-align:center;font-size:12px;color:var(--sub)}
/* Badge */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;border:1px solid}
.bg{background:rgba(0,214,143,.12);color:#33e8a8;border-color:rgba(0,214,143,.3)}
.br{background:rgba(255,68,85,.12);color:#ff6b7a;border-color:rgba(255,68,85,.3)}
.ba{background:rgba(255,184,48,.12);color:#ffc94d;border-color:rgba(255,184,48,.3)}
.bm{background:rgba(255,255,255,.06);color:var(--sub);border-color:rgba(255,255,255,.1)}
.bb{background:rgba(14,92,254,.12);color:var(--blue-l);border-color:rgba(14,92,254,.3)}
.corr-item{border-radius:8px;padding:10px 14px;margin-bottom:8px;border-left:3px solid}
.corr-crit{background:rgba(255,68,85,.07);border-color:var(--red)}
.corr-aviso{background:rgba(255,184,48,.07);border-color:var(--amber)}
.corr-info{background:rgba(14,92,254,.07);border-color:var(--blue)}
.corr-titulo{font-size:13px;font-weight:700;margin-bottom:4px}
.corr-detalhe{font-size:12px;color:#a0b8d0;margin-bottom:4px;line-height:1.5}
.corr-acao{font-size:11px;color:#8096b8;font-style:italic}
.lat-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px}
.lat-row:last-child{border:none}
.lat-lbl{width:80px;color:#a0b8d0;flex-shrink:0}
.lat-bar-wrap{flex:1;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.lat-bar{height:100%;border-radius:3px;transition:width .4s}
.lat-val{width:90px;text-align:right;font-family:var(--mono);font-weight:600;font-size:11px}
.lat-sub{font-size:10px;color:#8096b8;margin-left:4px}
.empty{text-align:center;padding:40px 20px;color:#8096b8;font-size:14px}
.loading{text-align:center;padding:40px;color:var(--sub);font-size:13px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── Responsivo ─────────────────────────────────────────────────── */
@media(max-width:768px){
  .main{padding:12px}
  .resumo{grid-template-columns:repeat(3,1fr);gap:7px}
  .grid{grid-template-columns:1fr;gap:10px}
  .toolbar{gap:6px}
  .filter-btn{padding:5px 9px;font-size:11px}
  .overlay{padding:8px}
  .modal-head{padding:14px}
  .modal-body{padding:14px}
  .modal-tab{padding:5px 10px;font-size:11px}
}
@media(max-width:480px){
  .main{padding:8px}
  .resumo{grid-template-columns:repeat(2,1fr);gap:6px}
  .rc{padding:10px 12px}
  .rc-val{font-size:18px}
  .rc-lbl{font-size:10px}
  .topbar{padding:0 10px}
  .logo{font-size:13px}
  #last-update{font-size:10px}
  .grid{grid-template-columns:1fr}
  .loja-head{padding:10px 12px;gap:8px}
  .score-circle{width:38px;height:38px;font-size:11px}
  .loja-nome{font-size:13px}
  .status-badge{font-size:10px;padding:3px 8px}
  .search-input{font-size:12px;padding:7px 10px}
  .filter-btn{padding:5px 8px;font-size:11px}
  .overlay{padding:4px}
  .modal{border-radius:10px}
  .modal-head{padding:12px}
  .modal-body{padding:10px}
  .modal-tabs{gap:3px;padding-bottom:4px}
  .modal-tab{padding:5px 8px;font-size:11px}
  /* Linha do modal empilha no mobile */
  .row{flex-wrap:wrap;gap:2px}
  .rv{font-size:12px}
  .rl{font-size:12px}
  /* Histórico: tabela com scroll horizontal */
  #hist-resultado{overflow-x:auto;-webkit-overflow-scrolling:touch}
  #hist-resultado table{min-width:500px}
  /* Topologia */
  #topo-noc-wrap{height:300px}
  /* Filtros em duas linhas */
  .toolbar{flex-wrap:wrap}
  #btn-order{margin-left:0}
}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">GOOMER <span>NOC</span></div>
  <div class="topbar-right">
    <span id="last-update">—</span>
    <button class="btn" onclick="carregar()">↺ atualizar</button>
  </div>
</div>

<div class="main">
  <div class="resumo" id="resumo"></div>
  <div id="versoes-config" style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:16px;flex-wrap:wrap">
    <div style="font-size:11px;font-weight:700;color:#a0b8d0;text-transform:uppercase;letter-spacing:.07em">Versões mínimas</div>
    <div style="display:flex;align-items:center;gap:8px;font-size:12px">
        <label style="color:#8096b8">Servidor Goomer:</label>
        <input id="ver-servidor" type="text" placeholder="ex: 2.4.114"
            style="background:var(--bg3);border:1px solid var(--border2);color:#e8eef8;padding:5px 10px;border-radius:5px;font-family:var(--mono);font-size:12px;width:100px">
    </div>
    <div style="display:flex;align-items:center;gap:8px;font-size:12px">
        <label style="color:#8096b8">App tablet:</label>
        <input id="ver-tablet" type="text" placeholder="ex: 2.10.3"
            style="background:var(--bg3);border:1px solid var(--border2);color:#e8eef8;padding:5px 10px;border-radius:5px;font-family:var(--mono);font-size:12px;width:100px">
    </div>
    <button onclick="salvarVersoes()"
        style="background:var(--blue);border:none;color:#fff;padding:6px 16px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600">
        💾 Salvar
    </button>
    <div id="ver-status" style="font-size:11px;color:#8096b8"></div>
  </div>

  <div class="toolbar">
    <input class="search-input" id="busca" placeholder="🔍  buscar loja por nome..." oninput="filtrar()">
    <button class="filter-btn ativo" id="f-todos"    onclick="setFiltro('todos')">Todas</button>
    <button class="filter-btn"       id="f-critico"  onclick="setFiltro('critico')">🔴 Crítico/Grave</button>
    <button class="filter-btn"       id="f-atencao"  onclick="setFiltro('atencao')">🟡 Atenção</button>
    <button class="filter-btn"       id="f-ok"       onclick="setFiltro('ok')">🟢 Estável/Saudável</button>
    <button class="filter-btn"       id="f-offline"       onclick="setFiltro('offline')">⚫ Offline</button>
    <button class="filter-btn"       id="f-desatualizado" onclick="setFiltro('desatualizado')">🔄 Desatualizado</button>
    <button class="filter-btn" id="btn-order" onclick="toggleOrder()" style="margin-left:auto" title="Ordenar por score">↑ score</button>
    <button class="filter-btn" onclick="exportarDesatualizados()" title="Exportar lojas desatualizadas" style="background:rgba(14,92,254,.1);border-color:rgba(14,92,254,.3);color:#7ab3ff">↓ exportar desatualizados</button>
  </div>

  <div id="grid"><div class="loading">carregando lojas...</div></div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="closeOverlay(event)">
  <div class="modal" id="modal">
    <div class="modal-head">
      <div>
        <div style="font-size:16px;font-weight:700" id="m-titulo">—</div>
        <div style="font-size:11px;color:#8096b8;margin-top:3px;font-family:var(--mono)" id="m-sub">—</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <button onclick="exportarLoja()" title="Exportar dados da loja"
              style="background:rgba(14,92,254,.1);border:1px solid rgba(14,92,254,.3);color:#7ab3ff;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600">
              ↓ exportar
          </button>
          <button onclick="bloquearLoja()" title="Bloquear loja no NOC"
              style="background:rgba(255,68,85,.1);border:1px solid rgba(255,68,85,.3);color:#ff6b7a;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600">
              ⊘ bloquear
          </button>
          <button class="modal-close" onclick="document.getElementById('overlay').classList.remove('on')">✕</button>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-tabs">
        <button class="modal-tab on" onclick="showTab('resumo')">Resumo</button>
        <button class="modal-tab"    onclick="showTab('diagnostico')">🔍 Diagnóstico</button>
        <button class="modal-tab"    onclick="showTab('tablets')">Tablets</button>
        <button class="modal-tab"    onclick="showTab('erros')">Logs de Erro</button>
        <button class="modal-tab"    onclick="showTab('topologia')">Topologia</button>
        <button class="modal-tab"    onclick="showTab('maquina')">Máquina</button>
        <button class="modal-tab"    onclick="showTab('historico')">Histórico</button>
      </div>
      <div id="tab-resumo"      class="modal-panel on"></div>
      <div id="tab-diagnostico" class="modal-panel"></div>
      <div id="tab-tablets"     class="modal-panel"></div>
      <div id="tab-erros"       class="modal-panel"></div>
      <div id="tab-topologia"   class="modal-panel"></div>
      <div id="tab-maquina"     class="modal-panel"></div>
      <div id="tab-historico"   class="modal-panel"></div>
    </div>
  </div>
</div>

<script>
const SB_URL = 'https://jlatddmzhatbznbgfhfa.supabase.co';
const SB_KEY = 'sb_publishable_2VjqdmgtHSAkY123Fyc_qQ_SbZawfuR';

const h = s => { const d=document.createElement('div'); d.textContent=String(s??''); return d.innerHTML; };

const COR_STATUS = s => ({
    'Saudável':'#00d68f','Estável':'#4d8fff',
    'Atenção':'#ffb830','Crítico':'#ff4455','Grave':'#cc2233'
}[s]||'#8096b8');

// Cor baseada no objeto loja (usa normStatus para forçamentos)
function corLoja(l) {
    const ns = normStatus(l);
    if (ns==='grave')   return '#ff4455';
    if (ns==='atencao') return '#ffb830';
    return '#00d68f';
}

const BAR_COR = (v,lo,hi) => v>=hi?'#ff4455':v>=lo?'#ffb830':'#00d68f';

let _dados = [], _filtro = 'todos', _order = 'asc'; // asc = piores primeiro
let _versoesPadrao = {}; // versões mínimas carregadas do Supabase

async function sb(path, q='') {
    const r = await fetch(`${SB_URL}/rest/v1/${path}${q}`,{
        headers:{
            'apikey': SB_KEY,
            'Authorization': `Bearer ${SB_KEY}`,
            'Content-Type': 'application/json'
        }
    });
    if (!r.ok) {
        console.error('Supabase erro:', r.status, r.statusText, await r.text().catch(()=>''));
        return [];
    }
    return r.json();
}

async function carregar() {
    document.getElementById('last-update').textContent =
        new Date().toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});

    // Carregar tudo em paralelo
    const [rows, bloqueadas, versoesPadrao] = await Promise.all([
        sb('snapshots','?select=*&order=criado_em.desc&limit=500'),
        sb('lojas_bloqueadas','?select=token_loja').catch(()=>[]),
        sb('versoes_padrao','?select=*').catch(()=>[])
    ]);
    const tokensBloqueados = new Set((Array.isArray(bloqueadas)?bloqueadas:[]).map(b=>b.token_loja));

    // Indexar versões padrão
    const vPadrao = {};
    (Array.isArray(versoesPadrao)?versoesPadrao:[]).forEach(v => { vPadrao[v.componente] = v.versao; });
    _versoesPadrao = vPadrao; // guardar globalmente para filtros e exportação

    if (!Array.isArray(rows)||!rows.length) {
        document.getElementById('grid').innerHTML =
            '<div class="empty">📡 Nenhuma loja conectada ainda.<br><span style="font-size:12px;color:#8096b8">Instale o agente nas lojas piloto e aguarde o primeiro envio.</span></div>';
        return;
    }

    // Agrupar por token — mais recente de cada loja (excluir bloqueadas)
    const map = {};
    rows.forEach(r => {
        if (tokensBloqueados.has(r.token_loja)) return; // ignorar bloqueadas
        if (!map[r.token_loja]||r.criado_em>map[r.token_loja].criado_em) map[r.token_loja]=r;
    });
    _dados = Object.values(map).sort((a,b)=>a.score-b.score);

    renderResumo();
    filtrar();
    preencherCamposVersao();
}

// Normalizar status — suporte a registros antigos (letras) e novos (texto)
function compararVersao(versaoAtual, versaoMinima) {
    if (!versaoAtual || !versaoMinima) return null; // sem dados
    const parse = v => (v||'0').split('.').map(n=>parseInt(n)||0);
    const a = parse(versaoAtual), m = parse(versaoMinima);
    for (let i=0; i<Math.max(a.length,m.length); i++) {
        const da = a[i]||0, dm = m[i]||0;
        if (da < dm) return 'desatualizado';
        if (da > dm) return 'atualizado';
    }
    return 'atualizado';
}

function normStatus(l) {
    const s = (l.status||l.nota||'').toLowerCase().trim();
    let cat;
    if (s==='grave'||s==='f')                  cat='grave';
    else if (s==='crítico'||s==='critico'||s==='d') cat='grave';
    else if (s==='atenção'||s==='atencao'||s==='c') cat='atencao';
    else if (s==='estável'||s==='estavel'||s==='b') cat='ok';
    else if (s==='saudável'||s==='saudavel'||s==='a') cat='ok';
    else cat='atencao';

    // Forçar categoria mínima para condições críticas (corrige snapshots antigos)
    if (!l.servidor_online && (cat==='ok')) cat='grave';
    const pay = l.payload||{};
    if (pay.inadimplente && cat==='ok') cat='grave';
    if ((l.retry_expirados||0)>0 && cat==='ok') cat='atencao';

    return cat;
}

// Status descritivo para exibição (considera forçamentos)
function statusLabel(l) {
    if (!l.servidor_online) return 'Crítico';
    const pay = l.payload||{};
    if (pay.inadimplente)          return 'Crítico';
    return l.status||l.nota||'?';
}

function renderResumo() {
    const total    = _dados.length;
    const graves   = _dados.filter(l=>normStatus(l)==='grave').length;
    const atencao  = _dados.filter(l=>normStatus(l)==='atencao').length;
    const ok       = _dados.filter(l=>normStatus(l)==='ok').length;
    const offline  = _dados.filter(l=>!l.servidor_online).length;
    const agora_r  = new Date();
    const semDados = _dados.filter(l=>Math.round((agora_r-new Date(l.criado_em))/60000)>60).length;
    const scoreAvg = total>0 ? Math.round(_dados.reduce((s,l)=>s+(l.score||0),0)/total) : 0;
    const tabAtivos= _dados.reduce((s,l)=>s+(l.tablets_ativos||0),0);

    document.getElementById('resumo').innerHTML = [
        {lbl:'Lojas monitoradas', val:total,            sub:'',              cor:''},
        {lbl:'Crítico / Grave',   val:graves,           sub:'ação imediata', cor:graves>0?'var(--red)':'var(--green)'},
        {lbl:'Atenção',           val:atencao,          sub:'monitorar',     cor:atencao>0?'var(--amber)':'var(--sub)'},
        {lbl:'Estável / Saudável',val:ok,               sub:'operação normal',cor:'var(--green)'},
        {lbl:'Servidor Goomer offline',  val:offline,          sub:'',              cor:offline>0?'var(--red)':'var(--green)'},
        {lbl:'Sem dados (+1h)',    val:semDados,         sub:'desconectados',  cor:semDados>0?'var(--red)':'var(--sub)'},
        {lbl:'Saúde média',       val:scoreAvg+'%',     sub:'saúde geral',   cor:''},
        {lbl:'Tablets ativos',    val:tabAtivos,        sub:'total nas lojas',cor:''},
    ].map(c=>`<div class="rc" style="${c.cor?'border-color:'+c.cor+'40':''}">
        <div class="rc-lbl">${c.lbl}</div>
        <div class="rc-val" style="color:${c.cor||'var(--text)'}">${c.val}</div>
        ${c.sub?`<div class="rc-sub">${c.sub}</div>`:''}
    </div>`).join('');
}

function toggleOrder() {
    _order = _order === 'asc' ? 'desc' : 'asc';
    const btn = document.getElementById('btn-order');
    if (btn) btn.textContent = _order === 'asc' ? '↑ score' : '↓ score';
    filtrar();
}

function setFiltro(f) {
    _filtro = f;
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('ativo'));
    document.getElementById('f-'+f)?.classList.add('ativo');
    filtrar();
}

function filtrar() {
    const busca = (document.getElementById('busca')?.value||'').toLowerCase();
    const agora = new Date();
    const lista = _dados.filter(l => {
        const nome   = (l.nome_loja||'').toLowerCase();
        const ip     = (l.ip_servidor||l.payload?.ip_servidor||'').toLowerCase();
        const mins_l = Math.round((agora - new Date(l.criado_em)) / 60000);
        if (busca && !nome.includes(busca) && !ip.includes(busca)) return false;
        const ns = normStatus(l);
        if (_filtro==='critico') return ns==='grave';
        if (_filtro==='atencao') return ns==='atencao';
        if (_filtro==='ok')      return ns==='ok';
        if (_filtro==='offline')      return !l.servidor_online || mins_l > 60;
        if (_filtro==='desatualizado') {
            const pay = l.payload||{};
            const srvDesat = _versoesPadrao.servidor_goomer &&
                compararVersao(pay.goomer_version, _versoesPadrao.servidor_goomer) === 'desatualizado';
            const tabDesat = _versoesPadrao.app_tablet &&
                (pay.tablets||[]).some(t => compararVersao(t.versao, _versoesPadrao.app_tablet) === 'desatualizado');
            return srvDesat || tabDesat;
        }
        return true;
    });
    lista.sort((a,b) => _order==='asc' ? a.score-b.score : b.score-a.score);
    renderGrid(lista);
}

// ── Gestão de versões padrão ──────────────────────────────────────────────────
async function salvarVersoes() {
    const srv = document.getElementById('ver-servidor')?.value?.trim();
    const tab = document.getElementById('ver-tablet')?.value?.trim();
    const st  = document.getElementById('ver-status');
    if (!srv && !tab) { if(st) st.textContent = 'Informe pelo menos uma versão.'; return; }
    if (st) st.textContent = 'Salvando...';

    const salvar = async (componente, versao, descricao) => {
        if (!versao) return true;
        const r = await fetch(`${SB_URL}/rest/v1/versoes_padrao`, {
            method: 'POST',
            headers: {
                'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`,
                'Content-Type': 'application/json',
                'Prefer': 'resolution=merge-duplicates,return=minimal'
            },
            body: JSON.stringify({ componente, versao, descricao, atualizado_por:'NOC', atualizado_em: new Date().toISOString() })
        });
        return r.ok || r.status === 409;
    };

    const ok1 = await salvar('servidor_goomer', srv, 'Servidor Goomer / Abrahão');
    const ok2 = await salvar('app_tablet',      tab, 'App tablet Goomer');

    if (ok1 && ok2) {
        if (srv) _versoesPadrao.servidor_goomer = srv;
        if (tab) _versoesPadrao.app_tablet      = tab;
        if (st) st.innerHTML = '<span style="color:var(--green)">✓ Salvo</span>';
        await carregar(); // recarregar para aplicar badges
    } else {
        if (st) st.innerHTML = '<span style="color:var(--red)">✗ Erro ao salvar</span>';
    }
}

function preencherCamposVersao() {

}

// ── Exportar lojas desatualizadas ─────────────────────────────────────────────
async function exportarDesatualizados() {
    if (!Object.keys(_versoesPadrao).length) {
        alert('Defina as versões mínimas antes de exportar.');
        return;
    }

    const agora = new Date();
    const lojas = _dados.filter(l => {
        const pay = l.payload||{};
        const srvDesat = _versoesPadrao.servidor_goomer &&
            compararVersao(pay.goomer_version, _versoesPadrao.servidor_goomer) === 'desatualizado';
        const tabDesat = _versoesPadrao.app_tablet &&
            (pay.tablets||[]).some(t => compararVersao(t.versao, _versoesPadrao.app_tablet) === 'desatualizado');
        return srvDesat || tabDesat;
    });

    if (!lojas.length) {
        alert('Nenhuma loja desatualizada encontrada com os critérios atuais.');
        return;
    }

    // CSV detalhado
    const linhas = [
        'Loja,IP Servidor,Versão Servidor,Status Servidor,App Desatualizado (tablets),Tablets Desatualizados,Score,Status,Último Snapshot'
    ];

    lojas.forEach(l => {
        const pay = l.payload||{};
        const srvVer  = pay.goomer_version || '—';
        const srvDesat= compararVersao(srvVer, _versoesPadrao.servidor_goomer) === 'desatualizado';
        const tabsDesat = (pay.tablets||[]).filter(t =>
            compararVersao(t.versao, _versoesPadrao.app_tablet) === 'desatualizado'
        );
        const tabDesatStr = tabsDesat.length > 0
            ? tabsDesat.map(t=>`${t.mesa?'Mesa '+t.mesa:t.ip||'?'} (v${t.versao})`).join(' | ')
            : '—';
        const hora = new Date(l.criado_em).toLocaleString('pt-BR');

        linhas.push([
            `"${(l.nome_loja||'?').replace(/"/g,'')}"`,
            `"${l.ip_servidor||pay.ip_servidor||'—'}"`,
            `"${srvVer}${srvDesat?' ⚠':''}"`,
            l.servidor_online?'online':'offline',
            tabsDesat.length > 0 ? 'SIM' : 'não',
            `"${tabDesatStr}"`,
            l.score||0,
            `"${l.status||l.nota||'?'}"`,
            `"${hora}"`
        ].join(','));
    });

    const csv = linhas.join('\n');
    const blob = new Blob([csv], { type:'text/csv;charset=utf-8' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `goomer_versoes_desatualizadas_${agora.toISOString().slice(0,10)}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    alert(`✓ ${lojas.length} loja(s) exportada(s).\nArquivo: ${a.download}`);
}

// ── Funções de erros históricos ───────────────────────────────────────────────
function atalhoErros(dias, token) {
    const ate = new Date(), de = new Date();
    if (dias === 1) { de.setHours(0,0,0,0); } else { de.setDate(de.getDate()-dias); }
    const fmt = d => d.toISOString().slice(0,16);
    const elDe = document.getElementById('erros-de');
    const elAte = document.getElementById('erros-ate');
    if (elDe) elDe.value = fmt(de);
    if (elAte) elAte.value = fmt(ate);
    buscarErrosHistorico(token);
}

async function buscarErrosHistorico(token) {
    const elRes  = document.getElementById('erros-resultado');
    const elDe   = document.getElementById('erros-de');
    const elAte  = document.getElementById('erros-ate');
    const elTipo = document.getElementById('erros-tipo');
    if (!elRes||!elDe||!elAte) return;
    elRes.innerHTML = '<div class="loading" style="padding:20px">Buscando...</div>';

    const de   = elDe.value;
    const ate  = elAte.value;
    const tipo = elTipo?.value || '';
    if (!de||!ate) { elRes.innerHTML = '<div style="font-size:12px;color:#8096b8;padding:12px">Selecione o período.</div>'; return; }

    // Buscar snapshots do período com top_erros preenchido
    let query = `?token_loja=eq.${encodeURIComponent(token)}&criado_em=gte.${encodeURIComponent(new Date(de).toISOString())}&criado_em=lte.${encodeURIComponent(new Date(ate).toISOString())}&order=criado_em.desc&limit=500`;
    const rows = await sb('snapshots', query);
    if (!Array.isArray(rows)||!rows.length) {
        elRes.innerHTML = '<div class="empty" style="padding:20px">Nenhum snapshot encontrado neste período.</div>';
        return;
    }

    // Agregar top_erros de todos os snapshots
    const mapaErros = {};
    rows.forEach(r => {
        const erros = r.payload?.top_erros || [];
        erros.forEach(e => {
            const chave = (e.type||'?') + '|' + (e.msg_resumo||e.message||'');
            if (!mapaErros[chave]) {
                mapaErros[chave] = { type: e.type, msg: e.msg_resumo||e.message||'—', total: 0, ultima_vez: e.ultima_vez };
            }
            mapaErros[chave].total += parseInt(e.total||1);
            if (e.ultima_vez > mapaErros[chave].ultima_vez) mapaErros[chave].ultima_vez = e.ultima_vez;
        });
    });

    let lista = Object.values(mapaErros).sort((a,b)=>b.total-a.total);
    if (tipo) lista = lista.filter(e => e.type === tipo);

    if (!lista.length) {
        elRes.innerHTML = `<div class="empty" style="padding:16px">✓ Nenhum erro encontrado${tipo?' do tipo '+tipo:''} no período.</div>`;
        return;
    }

    const totalSnapshots = rows.length;
    const totalErros = lista.reduce((s,e)=>s+e.total,0);

    elRes.innerHTML = `
        <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
            <div style="background:var(--bg3);border-radius:7px;padding:8px 14px;font-size:12px">
                <span style="font-weight:700;font-family:var(--mono);color:#e8eef8">${totalErros}</span>
                <span style="color:#a0b8d0"> erros totais</span>
            </div>
            <div style="background:var(--bg3);border-radius:7px;padding:8px 14px;font-size:12px">
                <span style="font-weight:700;font-family:var(--mono);color:#e8eef8">${lista.length}</span>
                <span style="color:#a0b8d0"> tipos distintos</span>
            </div>
            <div style="background:var(--bg3);border-radius:7px;padding:8px 14px;font-size:12px">
                <span style="font-weight:700;font-family:var(--mono);color:#8096b8">${totalSnapshots}</span>
                <span style="color:#a0b8d0"> snapshots analisados</span>
            </div>
        </div>
        ${lista.map(e=>`<div class="erro-item">
            <div class="erro-msg" style="font-size:12px;line-height:1.5;word-break:break-word;white-space:normal">${h(e.msg)}</div>
            <div class="erro-meta" style="margin-top:5px">
                <span class="badge ${e.type==='print'?'ba':e.type==='order'?'br':'bb'}">${h(e.type||'?')}</span>
                <span style="font-weight:700;color:#e8eef8">${e.total}x</span>
                <span>último: ${e.ultima_vez?new Date(e.ultima_vez).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'—'}</span>
            </div>
        </div>`).join('')}`;
}

// ── Histórico com filtro de período ──────────────────────────────────────────
function atalhoHist(dias, token) {
    const ate  = new Date();
    const de   = new Date();
    if (dias === 1) {
        // Hoje: meia-noite até agora
        de.setHours(0,0,0,0);
    } else {
        de.setDate(de.getDate() - dias);
    }
    const fmt = d => d.toISOString().slice(0,16);
    const elDe  = document.getElementById('hist-de');
    const elAte = document.getElementById('hist-ate');
    if (elDe)  elDe.value  = fmt(de);
    if (elAte) elAte.value = fmt(ate);
    buscarHistorico(token);
}

async function buscarHistorico(token) {
    const elRes = document.getElementById('hist-resultado');
    const elDe  = document.getElementById('hist-de');
    const elAte = document.getElementById('hist-ate');
    if (!elRes || !elDe || !elAte) return;

    const de  = elDe.value;
    const ate = elAte.value;
    if (!de || !ate) { elRes.innerHTML = '<div class="empty">Selecione o período.</div>'; return; }

    elRes.innerHTML = '<div class="loading">Buscando...</div>';

    const rows = await sb('snapshots',
        `?token_loja=eq.${encodeURIComponent(token)}&criado_em=gte.${encodeURIComponent(new Date(de).toISOString())}&criado_em=lte.${encodeURIComponent(new Date(ate).toISOString())}&order=criado_em.asc&limit=500`
    );

    if (!Array.isArray(rows) || rows.length === 0) {
        elRes.innerHTML = '<div class="empty">Nenhum snapshot encontrado neste período.</div>';
        return;
    }

    // Gráfico de score
    const maxBars = 60;
    const step = Math.max(1, Math.floor(rows.length / maxBars));
    const amostra = rows.filter((_,i) => i % step === 0);

    // Resumo do período
    const scoreMin  = Math.min(...rows.map(r=>r.score||0));
    const scoreMax  = Math.max(...rows.map(r=>r.score||0));
    const scoreMed  = Math.round(rows.reduce((s,r)=>s+(r.score||0),0)/rows.length);
    const offlines  = rows.filter(r=>!r.servidor_online).length;
    const comErro   = rows.filter(r=>(r.retry_expirados||0)>0).length;
    const trocouIP  = [...new Set(rows.map(r=>r.ip_servidor||r.payload?.ip_servidor).filter(Boolean))];

    elRes.innerHTML = `
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px">
            <div style="background:var(--bg3);border-radius:7px;padding:10px;text-align:center">
                <div style="font-size:18px;font-weight:800;font-family:var(--mono)">${rows.length}</div>
                <div style="font-size:10px;color:#a0b8d0;margin-top:2px">snapshots</div>
            </div>
            <div style="background:var(--bg3);border-radius:7px;padding:10px;text-align:center">
                <div style="font-size:18px;font-weight:800;font-family:var(--mono);color:${scoreMed>=75?'var(--green)':scoreMed>=45?'var(--amber)':'var(--red)'}">${scoreMed}%</div>
                <div style="font-size:10px;color:#a0b8d0;margin-top:2px">saúde média</div>
            </div>
            <div style="background:var(--bg3);border-radius:7px;padding:10px;text-align:center">
                <div style="font-size:18px;font-weight:800;font-family:var(--mono);color:${offlines>0?'var(--red)':'var(--green)'}">${offlines}</div>
                <div style="font-size:10px;color:#a0b8d0;margin-top:2px">servidor offline</div>
            </div>
            <div style="background:var(--bg3);border-radius:7px;padding:10px;text-align:center">
                <div style="font-size:18px;font-weight:800;font-family:var(--mono);color:${comErro>0?'var(--red)':'var(--green)'}">${comErro}</div>
                <div style="font-size:10px;color:#a0b8d0;margin-top:2px">com pedido sem ERP</div>
            </div>
        </div>

        ${trocouIP.length>1?`<div style="background:rgba(255,184,48,.08);border:1px solid rgba(255,184,48,.3);border-radius:7px;padding:8px 12px;font-size:12px;color:var(--amber);margin-bottom:12px">
            ⚠ Mudança de IP detectada no período: ${trocouIP.map(h).join(' → ')}
        </div>`:''}

        <div class="sec"><div class="sec-t">saúde ao longo do período (${rows.length} snapshots)</div>
            <div class="hist" style="height:60px;gap:1px">${amostra.map(s=>{
                const c=COR_STATUS(s.status||s.nota);
                const hh=Math.max(Math.round(((s.score||0)/100)*56),2);
                const hora=new Date(s.criado_em).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
                return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end">
                    <div class="hist-bar" style="height:${hh}px;background:${c};width:100%" title="${hora}: ${s.score}% — ${statusLabel(s)}"></div>
                </div>`;
            }).join('')}</div>
            <div style="display:flex;justify-content:space-between;font-size:10px;color:#8096b8;margin-top:4px;font-family:var(--mono)">
                <span>${new Date(rows[0].criado_em).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</span>
                <span>mín: ${scoreMin}% · méd: ${scoreMed}% · máx: ${scoreMax}%</span>
                <span>${new Date(rows[rows.length-1].criado_em).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</span>

        <div class="sec"><div class="sec-t">registros do período</div>
            <div style="overflow-x:auto;-webkit-overflow-scrolling:touch">

                    const hora = new Date(s.criado_em).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});

                        <td style="padding:5px 0;text-align:center;color:${c};font-size:11px">${statusLabel(s)}</td>
                        <td style="padding:5px 0;text-align:center;font-size:11px;color:${s.servidor_online?'var(--green)':'var(--red)'}">${s.servidor_online?'ON':'OFF'}</td>
                        <td style="padding:5px 0;text-align:center;font-family:var(--mono);color:${(s.retry_expirados||0)>0?'var(--red)':'#8096b8'}">${s.retry_expirados||0}</td>
                        <td style="padding:5px 0;text-align:center;font-family:var(--mono);color:${(s.erros_log||0)>200?'var(--red)':(s.erros_log||0)>50?'var(--amber)':'#8096b8'}">${s.erros_log||0}</td>
                        <td style="padding:5px 0;text-align:center;font-family:var(--mono);color:${divg?'var(--red)':'#7ab3ff'};font-size:11px">${h(sipR)}${divg?' ⚠':''}</td>
                        <td style="padding:5px 0;text-align:right;font-family:var(--mono);color:${divg?'var(--red)':'#8096b8'};font-size:11px">${h(sipC)}</td>
                    </tr>`;
                }).join('')}
            </table>
            </div>

// ── Topologia NOC interativa ───────────────────────────────────────────────
let nocTopoScale=1, nocVX=0, nocVY=0;
let nocDragging=null, nocNodes={};
let nocPanActive=false, nocPanSX=0, nocPanSY=0, nocPanVX=0, nocPanVY=0;
let nocSpaceDown=false;
let _nocTablets=[], _nocImps=[], _nocIP='';
let _nocPanIntervals={};

function nocPanBtn(dir, active) {
    clearInterval(_nocPanIntervals[dir]);
    if (!active) return;
    const step = 12;
    const mover = () => {
        if (dir==='up')    nocVY += step;
        if (dir==='down')  nocVY -= step;
        if (dir==='left')  nocVX += step;
        if (dir==='right') nocVX -= step;
        applyNocTransform();
    };
    mover();
    _nocPanIntervals[dir] = setInterval(mover, 80);
}

document.addEventListener('keydown',e=>{
    if(e.code==='Space'&&document.getElementById('tab-topologia')?.classList.contains('on')){
        e.preventDefault(); nocSpaceDown=true;
        const el=document.getElementById('topo-noc-wrap');
        if(el) el.style.cursor='grab';
    }
});
document.addEventListener('keyup',e=>{ if(e.code==='Space') nocSpaceDown=false; });

function applyNocTransform(){
    const g=document.getElementById('topo-noc-g');
    if(g) g.setAttribute('transform',`translate(${nocVX},${nocVY}) scale(${nocTopoScale})`);
}
function nocTopoZoom(d){
    nocTopoScale=Math.max(0.25,Math.min(3,nocTopoScale+d));
    applyNocTransform();
}
function nocTopoCentralizar(){
    const keys=Object.keys(nocNodes).filter(k=>!['gw','srv'].includes(k)||nocNodes[k]);
    if(!keys.length) return;
    const wrap=document.getElementById('topo-noc-wrap');
    if(!wrap) return;
    const W=wrap.clientWidth, H=wrap.clientHeight;
    const xs=keys.map(k=>nocNodes[k].x), ys=keys.map(k=>nocNodes[k].y);
    const minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys);
    const mapW=maxX-minX+220, mapH=maxY-minY+220;
    nocTopoScale=Math.min(Math.max(Math.min(W/mapW,H/mapH)*0.88,0.3),2);
    nocVX=W/2-((minX+maxX)/2)*nocTopoScale;
    nocVY=H/2-((minY+maxY)/2)*nocTopoScale;
    applyNocTransform();
}

function renderTopoNoc(tablets, imps, serverIp) {
    _nocTablets=tablets; _nocImps=imps; _nocIP=serverIp;
    const wrap = document.getElementById('topo-noc-wrap');
    const svg  = document.getElementById('topo-noc-svg');
    if(!wrap||!svg) return;

    const W=1000, H=700, cx=W/2;

    // Só resetar posição/scale se for primeira renderização
    if(Object.keys(nocNodes).length===0){
        nocTopoScale=1; nocVX=0; nocVY=0;
    }

    // Calcular posições se não existirem
    const posGW  = nocNodes['gw']  || {x:cx, y:80};
    const posSRV = nocNodes['srv'] || {x:cx, y:210};
    nocNodes['gw']  = posGW;
    nocNodes['srv'] = posSRV;

    const ativos  = tablets.filter(t=>t.ip&&t.ip!=='null');
    const impRede = imps.filter(i=>i.uri?.match(/\d+\.\d+\.\d+\.\d+/));
    const impUsb  = imps.filter(i=>!i.uri?.match(/\d+\.\d+\.\d+\.\d+/));

    ativos.forEach((t,i) => {
        if(!nocNodes['t'+i]){
            const tot=ativos.length, frac=tot===1?.5:i/(tot-1);
            const r=Math.max(240,100+tot*55);
            const ang=-Math.PI*.85+frac*Math.PI*.7;
            nocNodes['t'+i]={x:cx-70+r*Math.cos(ang), y:340+r*.55*Math.sin(ang)};
        }
    });
    impRede.forEach((p,i) => {
        if(!nocNodes['ir'+i]){
            const tot=impRede.length, frac=tot===1?.5:i/(tot-1);
            const r=Math.max(230,100+tot*65);
            const ang=-Math.PI*.15-frac*Math.PI*.7;
            nocNodes['ir'+i]={x:cx+70+r*Math.cos(ang), y:340+r*.5*Math.sin(ang)};
        }
    });
    impUsb.forEach((p,i) => {
        if(!nocNodes['iu'+i]) nocNodes['iu'+i]={x:cx+160+i*130, y:220};
    });

    // Resolver colisões
    const all=['gw','srv',...ativos.map((_,i)=>'t'+i),...impRede.map((_,i)=>'ir'+i),...impUsb.map((_,i)=>'iu'+i)];
    for(let it=0;it<25;it++){
        for(let a=0;a<all.length;a++) for(let b=a+1;b<all.length;b++){
            const na=nocNodes[all[a]],nb=nocNodes[all[b]];
            if(!na||!nb) continue;
            const dx=nb.x-na.x,dy=nb.y-na.y,dist=Math.sqrt(dx*dx+dy*dy);
            if(dist<130&&dist>0){
                const push=(130-dist)/2,nx=dx/dist*push,ny=dy/dist*push;
                if(!['gw','srv'].includes(all[b])){nb.x+=nx;nb.y+=ny;}
                if(!['gw','srv'].includes(all[a])){na.x-=nx;na.y-=ny;}
            }
        }
    }

    const sCor=p=>!p||p.status==='sem_ip'?'#505068':p.status==='sem resposta'||p.perda===100?'#ff4455':p.latencia>150?'#ffb830':'#00d68f';
    const lLbl=p=>!p||p.status==='sem_ip'?'—':p.status==='sem resposta'?'offline':p.latencia?p.latencia+'ms':'…';

    let g=``;

    // Internet
    g+=`<circle cx="${cx}" cy="16" r="14" fill="#0d1626" stroke="rgba(255,255,255,.15)" stroke-width="1.5"/>`;
    g+=`<text x="${cx}" y="21" text-anchor="middle" fill="#b0c4de" font-size="13">☁</text>`;
    g+=`<line x1="${cx}" y1="30" x2="${cx}" y2="${posGW.y-32}" stroke="rgba(255,255,255,.12)" stroke-width="1.5" stroke-dasharray="5,3"/>`;

    // GW → SRV
    g+=`<line x1="${cx}" y1="${posGW.y+32}" x2="${cx}" y2="${posSRV.y-32}" stroke="#4d8fff" stroke-width="2.5"/>`;

    // SRV → tablets
    ativos.forEach((t,i)=>{
        const pt=nocNodes['t'+i],cor=sCor(t.ping);
        g+=`<line x1="${cx}" y1="${posSRV.y+32}" x2="${pt.x}" y2="${pt.y-34}" stroke="${cor}" stroke-width="1.8" opacity=".8"/>`;
        const mx=(cx+pt.x)/2,my=(posSRV.y+34+pt.y-34)/2;
        const ll=lLbl(t.ping);
        g+=`<rect x="${mx-14}" y="${my-9}" width="${ll.length*6.5+6}" height="18" rx="4" fill="#0a1020" opacity=".9"/>`;
        g+=`<text x="${mx-11}" y="${my+5}" fill="${cor}" font-size="11" font-family="monospace" font-weight="600">${ll}</text>`;
    });

    // SRV → imp rede
    impRede.forEach((p,i)=>{
        const pp=nocNodes['ir'+i];
        g+=`<line x1="${cx}" y1="${posSRV.y+32}" x2="${pp.x}" y2="${pp.y-32}" stroke="#00d68f" stroke-width="1.8" opacity=".7"/>`;
    });

    // SRV → imp USB
    impUsb.forEach((p,i)=>{
        const pp=nocNodes['iu'+i];
        g+=`<line x1="${cx}" y1="${posSRV.y}" x2="${pp.x}" y2="${pp.y+32}" stroke="#7c5cfc" stroke-width="1.5" stroke-dasharray="6,3" opacity=".8"/>`;
        const mx=(cx+pp.x)/2,my=(posSRV.y+pp.y)/2;
        g+=`<rect x="${mx-16}" y="${my-9}" width="34" height="18" rx="4" fill="#0a1020" opacity=".9"/>`;
        g+=`<text x="${mx}" y="${my+5}" text-anchor="middle" fill="#7c5cfc" font-size="11" font-family="monospace" font-weight="600">USB</text>`;
    });

    // Helper nó
    const nodo=(pos,cor,l1,l2,icon,nid)=>{
        const NW=120,NH=72,x=pos.x-NW/2,y=pos.y-NH/2;
        const drag=nid?`class="noc-node" data-nid="${nid}" style="cursor:grab"`:'';
        return `<g ${drag}>
            <rect x="${x}" y="${y}" width="${NW}" height="${NH}" rx="10" fill="#0d1626" stroke="${cor}" stroke-width="2"/>
            <text x="${pos.x}" y="${pos.y-10}" text-anchor="middle" fill="${cor}" font-size="16">${icon}</text>
            <text x="${pos.x}" y="${pos.y+9}" text-anchor="middle" fill="#e8eef8" font-size="12" font-weight="700" font-family="monospace">${h(l1)}</text>
            <text x="${pos.x}" y="${pos.y+24}" text-anchor="middle" fill="#c8d8e8" font-size="10" font-family="monospace">${h(l2||'')}</text>
        </g>`;
    };

    g+=nodo(posGW,'#4d8fff','gateway','','⌘','');
    g+=nodo(posSRV,'#0e5cfe',serverIp||'servidor','servidor','⬡','');

    ativos.forEach((t,i)=>{
        const pt=nocNodes['t'+i],cor=sCor(t.ping);
        const bat=parseInt(t.bateria||0),bc=bat<20?'#ff4455':bat<40?'#ffb830':'#00d68f';
        const NW=120,NH=76,x=pt.x-NW/2,y=pt.y-NH/2;
        g+=`<g class="noc-node" data-nid="t${i}" style="cursor:grab">
            <rect x="${x}" y="${y}" width="${NW}" height="${NH}" rx="10" fill="#0d1626" stroke="${cor}" stroke-width="2"/>
            <text x="${pt.x}" y="${pt.y-11}" text-anchor="middle" fill="${cor}" font-size="15">📱</text>
            <text x="${pt.x}" y="${pt.y+7}" text-anchor="middle" fill="#e8eef8" font-size="12" font-weight="700" font-family="monospace">${t.mesa?`Mesa ${t.mesa}`:h((t.ip||'').split('.').slice(-1)[0]?'...'+t.ip.split('.').slice(-1)[0]:'?')}</text>
            <text x="${pt.x}" y="${pt.y+22}" text-anchor="middle" fill="#c8d8e8" font-size="10" font-family="monospace">${h(t.ip||'sem IP')}</text>
            ${bat>0?`<rect x="${x+NW-30}" y="${y+5}" width="24" height="12" rx="2" fill="#0d1626" stroke="${bc}" stroke-width="1.3"/>
            <rect x="${x+NW-29}" y="${y+6}" width="${Math.round(bat/100*22)}" height="10" rx="1" fill="${bc}" opacity=".85"/>
            <text x="${pt.x+NW/2-20}" y="${y+23}" text-anchor="middle" fill="${bc}" font-size="9" font-family="monospace">${bat}%</text>`:''}
        </g>`;
    });

    impRede.forEach((p,i)=>{
        const pp=nocNodes['ir'+i];
        g+=nodo(pp,'#00d68f',h((p.nome||'').slice(0,12)),h((p.uri||'').match(/(\d+\.\d+\.\d+\.\d+)/)?.[1]||'rede'),'🖨','ir'+i);
    });
    impUsb.forEach((p,i)=>{
        const pp=nocNodes['iu'+i];
        g+=nodo(pp,'#7c5cfc',h((p.nome||'').slice(0,12)),'USB','🖨','iu'+i);
    });

    // Atualizar SVG preservando o elemento
    svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
    svg.innerHTML = `<defs><filter id="nf"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><g id="topo-noc-g">${g}</g>`;

    applyNocTransform();

    // Eventos no wrap (pan + wheel)
    wrap.onmousedown = e => {
        if(e.button===2||e.button===1||nocSpaceDown){
            nocPanActive=true; nocPanSX=e.clientX; nocPanSY=e.clientY;
            nocPanVX=nocVX; nocPanVY=nocVY; wrap.style.cursor='grabbing'; e.preventDefault();
        }
    };
    wrap.onmousemove = e => {
        if(nocPanActive){
            nocVX=nocPanVX+(e.clientX-nocPanSX); nocVY=nocPanVY+(e.clientY-nocPanSY);
            applyNocTransform();
        }
        if(nocDragging){
            const rect=wrap.getBoundingClientRect();
            nocNodes[nocDragging]={x:(e.clientX-rect.left-nocVX)/nocTopoScale, y:(e.clientY-rect.top-nocVY)/nocTopoScale};
            renderTopoNoc(_nocTablets,_nocImps,_nocIP);
        }
    };
    wrap.onmouseup  = () => { nocPanActive=false; nocDragging=null; wrap.style.cursor='default'; };
    wrap.onmouseleave = () => { nocPanActive=false; nocDragging=null; };
    wrap.oncontextmenu = e => e.preventDefault();
    wrap.onwheel = e => { e.preventDefault(); nocTopoZoom(e.deltaY<0?.1:-.1); };

    // Drag nos nós
    svg.querySelectorAll('.noc-node').forEach(el=>{
        el.onmousedown = e => {
            if(e.button!==0||nocSpaceDown) return;
            e.stopPropagation(); nocDragging=el.dataset.nid; wrap.style.cursor='grabbing';
        };
    });

    // Botões externos
    const bp=document.getElementById('btn-topo-plus');
    const bm=document.getElementById('btn-topo-minus');
    const bf=document.getElementById('btn-topo-fit');
    if(bp) { bp.onclick=()=>nocTopoZoom(.15); }
    if(bm) { bm.onclick=()=>nocTopoZoom(-.15); }
    if(bf) { bf.onclick=()=>nocTopoCentralizar(); }

    // Aguardar SVG estar pronto e centralizar com fit completo
    setTimeout(() => {
